      const hour = gatewayStats?.hourlyStats?.[hourKey] || {};
      const cache = summarizeCache(hour.models || {});
      const hourLabel = `${hourKey.slice(11, 13)}:00`;
      return {
        key: hourKey,
        label: hourLabel,
        requests: Number(hour.requests) || 0,
        tokens: Number(hour.tokens) || 0,
        ...cache
      };
    }

    function addLogToTimePoint(point, entry = {}) {
      const tokens = Number(entry.tokens) || 0;
      const cacheReadInputTokens = Number(entry.cacheReadInputTokens) || 0;
      const cacheCreationInputTokens = Number(entry.cacheCreationInputTokens) || 0;
      point.requests += 1;
      point.tokens += tokens;
      if (cacheReadInputTokens > 0) point.cacheHitCount += 1;
      point.cacheReadInputTokens += cacheReadInputTokens;
      point.cacheCreationInputTokens += cacheCreationInputTokens;
    }

    function buildHourlyTimeSeries(dateKey) {
      const prefix = `${dateKey}T`;
      const hourlyStats = gatewayStats?.hourlyStats || {};
      const hasHourlyStats = Object.keys(hourlyStats).some(key => key.startsWith(prefix));
      const series = Array.from({ length: 24 }, (_, hour) => {
        const hourKey = `${prefix}${String(hour).padStart(2, '0')}`;
        return hasHourlyStats
          ? getHourStats(hourKey)
          : { key: hourKey, label: `${String(hour).padStart(2, '0')}:00`, requests: 0, tokens: 0, cacheHitCount: 0, cacheReadInputTokens: 0, cacheCreationInputTokens: 0 };
      });

      if (!hasHourlyStats) {
        for (const entry of gatewayStats?.recentLogs || []) {
          const timestamp = getLogTimestamp(entry);
          if (!timestamp) continue;
          const date = new Date(timestamp);
          if (date.toISOString().slice(0, 10) !== dateKey) continue;
          addLogToTimePoint(series[date.getUTCHours()], entry);
        }
      }
      return series;
    }

    function buildTimeSeries(range) {
      if (!gatewayStats) return [];
      if (range.mode === 'today' && range.keys?.[0]) return buildHourlyTimeSeries(range.keys[0]);
      const dailyStats = gatewayStats.dailyStats || {};
      const keys = range.keys || Object.keys(dailyStats).sort().slice(-30);
      return keys.map(getDayStats);
    }

    function getLogTimestamp(entry = {}) {
      const timestamp = Date.parse(entry.timestamp || '');
      return Number.isFinite(timestamp) ? timestamp : 0;
    }

    function makeEmptyModelSummary() {
      return { count: 0, tokens: 0, failures: 0, cacheHitCount: 0, cacheReadInputTokens: 0, cacheCreationInputTokens: 0 };
    }

    function addLogToSummary(summary, entry = {}) {
      const tokens = Number(entry.tokens) || 0;
      const cacheReadInputTokens = Number(entry.cacheReadInputTokens) || 0;
      const cacheCreationInputTokens = Number(entry.cacheCreationInputTokens) || 0;
      const failed = entry.success === false ? 1 : 0;
      const cacheHit = entry.cacheHit ? 1 : 0;
      summary.requests += 1;
      summary.tokens += tokens;
      summary.failures += failed;
      summary.cacheHitCount += cacheHit;
      summary.cacheReadInputTokens += cacheReadInputTokens;
      summary.cacheCreationInputTokens += cacheCreationInputTokens;

      const model = String(entry.model || 'unknown');
      if (!summary.models[model]) summary.models[model] = makeEmptyModelSummary();
      summary.models[model].count += 1;
      summary.models[model].tokens += tokens;
      summary.models[model].failures += failed;
      summary.models[model].cacheHitCount += cacheHit;
      summary.models[model].cacheReadInputTokens += cacheReadInputTokens;
      summary.models[model].cacheCreationInputTokens += cacheCreationInputTokens;
    }

    function summarizeLogs(logs = []) {
      const summary = makeEmptyLogSummary();
      for (const entry of logs) addLogToSummary(summary, entry);
      return summary;
    }

    function getRecentLogsSince(hours) {
      const logs = Array.isArray(gatewayStats?.recentLogs) ? gatewayStats.recentLogs : [];
      const cutoff = Date.now() - hours * 60 * 60 * 1000;
      return logs.filter(entry => {
        const timestamp = getLogTimestamp(entry);
        return timestamp && timestamp >= cutoff;
      });
    }

    function getRecentDelta() {
      if (!gatewayStats) return makeEmptyRecentDelta();
      const todayKey = shiftDateKey(0);
      const yesterdayKey = shiftDateKey(1);
      const today = gatewayStats.dailyStats?.[todayKey] || {};
      const yesterday = gatewayStats.dailyStats?.[yesterdayKey] || {};
      const recentLogs = Array.isArray(gatewayStats.recentLogs) ? gatewayStats.recentLogs : [];
      const latest = recentLogs[0] || {};
      return {
        lastHour: summarizeLogs(getRecentLogsSince(1)),
        last24h: summarizeLogs(getRecentLogsSince(24)),
        today: { requests: Number(today.requests) || 0, tokens: Number(today.tokens) || 0, models: today.models || {} },
        yesterday: { requests: Number(yesterday.requests) || 0, tokens: Number(yesterday.tokens) || 0, models: yesterday.models || {} },
        latestTime: latest.time || (latest.timestamp ? new Date(latest.timestamp).toLocaleString('zh-CN') : '')
      };
    }

    function getFilteredStats() {
      const range = getStatsDateRange();
      if (!gatewayStats) return makeEmptyStatsView(range.label);

      if (!range.keys) {
        const modelUsage = gatewayStats.modelUsage || {};
        const cache = summarizeCache(modelUsage);
        return {
          ...makeEmptyStatsView(range.label),
          totalRequests: gatewayStats.totalRequests || 0,
          totalTokens: Object.values(modelUsage).reduce((sum, item) => sum + (item?.tokens || 0), 0),
          ...cache,
          modelUsage,
          channelUsage: gatewayStats.channelUsage || {},
          ipUsage: gatewayStats.ipUsage || {},
          recentLogs: gatewayStats.recentLogs || [],
          timeSeries: buildTimeSeries(range),
          recentDelta: getRecentDelta()
        };
      }

      const keySet = new Set(range.keys);
      const view = makeEmptyStatsView(range.label);
      for (const key of range.keys) {
        const day = gatewayStats.dailyStats?.[key];
        if (!day) continue;
        view.totalRequests += day.requests || 0;
        view.totalTokens += day.tokens || 0;
        for (const [name, item] of Object.entries(day.models || {})) addUsage(view.modelUsage, name, item);
        for (const [name, item] of Object.entries(day.channels || {})) addUsage(view.channelUsage, name, item);
        for (const [name, item] of Object.entries(day.ips || {})) addUsage(view.ipUsage, name, item);
      }
      view.recentLogs = (gatewayStats.recentLogs || []).filter(entry => {
        const key = entry.timestamp ? new Date(entry.timestamp).toISOString().slice(0, 10) : '';
        return keySet.has(key);
      });
      view.timeSeries = buildTimeSeries(range);
      view.recentDelta = getRecentDelta();
      Object.assign(view, summarizeCache(view.modelUsage));
      return view;
    }

    function renderStatsForRange() {
      const custom = document.getElementById('statsCustomRange');
      const mode = document.getElementById('statsRange')?.value || 'all';
      custom?.classList.toggle('active', mode === 'custom');
      if (mode === 'custom') {
        const today = shiftDateKey(0);
        if (!document.getElementById('statsStart').value) document.getElementById('statsStart').value = today;
        if (!document.getElementById('statsEnd').value) document.getElementById('statsEnd').value = today;
      }
      statsView = getFilteredStats();
      document.getElementById('statsRangeLabel').textContent = statsView.label;
      renderHeaderStats();
      renderUsageStats();
    }

    function getStatsMetric() {
      return document.getElementById('statsMetric')?.value === 'tokens' ? 'tokens' : 'requests';
    }

    function getMetricLabel(metric = getStatsMetric()) {
      return metric === 'tokens' ? 'Token' : '请求';
    }

    function getMetricValue(item = {}, metric = getStatsMetric()) {
      return metric === 'tokens' ? (Number(item.tokens) || 0) : (Number(item.requests ?? item.count) || 0);
    }

    function formatMetricValue(value, metric = getStatsMetric()) {
      return metric === 'tokens' ? `${formatNumber(value)} tok` : `${formatNumber(value)} 次`;
    }

    function formatSignedMetricValue(value, metric = getStatsMetric()) {
      const number = Number(value) || 0;
      return metric === 'tokens' ? `${number > 0 ? '+' : ''}${formatNumber(number)} tok` : formatSignedNumber(number);
    }

    function formatSecondaryMetric(item = {}, metric = getStatsMetric(), signed = false) {
      const value = metric === 'tokens' ? (Number(item.count) || 0) : (Number(item.tokens) || 0);
      const formatted = signed ? formatSignedNumber(value) : formatNumber(value);
      return metric === 'tokens' ? `${formatted} 次` : `${formatted} tok`;
    }

    function getUsageEntries(usage = {}, limit = 8, metric = getStatsMetric()) {
      return Object.entries(usage)
        .sort((a, b) => getMetricValue(b[1], metric) - getMetricValue(a[1], metric))
        .slice(0, limit);
    }

    function formatUsageBars(usage = {}, limit = 8) {
      const metric = getStatsMetric();
      const entries = getUsageEntries(usage, limit, metric);
      if (!entries.length) return '<div class="empty">暂无统计</div>';
      const maxMetric = Math.max(...entries.map(([, item]) => getMetricValue(item, metric)), 1);
      return `<div class="bar-list">${entries.map(([name, item]) => {
        const value = getMetricValue(item, metric);
        const width = value ? Math.max(3, Math.round((value / maxMetric) * 100)) : 0;
        const secondary = formatSecondaryMetric(item, metric);
        return `
      <div class="bar-row">
        <div class="bar-head">
          <span class="bar-name" title="${escapeHtml(name)}">${escapeHtml(name)}</span>
          <span class="bar-main">${formatMetricValue(value, metric)}</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${width}%"></div></div>
        <div class="bar-foot">
          <span>${secondary}</span>
          <span>${escapeHtml(getMetricLabel(metric))}</span>
        </div>
      </div>
    `;
      }).join('')}</div>`;
    }

    function formatSignedNumber(value) {
      const number = Number(value) || 0;
      return `${number > 0 ? '+' : ''}${formatNumber(number)}`;
    }

    function deltaClass(value) {
      const number = Number(value) || 0;
      if (number > 0) return 'delta-up';
      if (number < 0) return 'delta-down';
      return 'delta-flat';
    }

    function formatTopModelLine(summary = {}, metric = getStatsMetric()) {
      const entries = getUsageEntries(summary.models || {}, 1, metric);
      if (!entries.length) return '<span class="delta-model">主模型：暂无</span>';
      const [name, item] = entries[0];
      const secondary = formatSecondaryMetric(item, metric);
      return `<span class="delta-model" title="${escapeHtml(name)}">主模型：${escapeHtml(name)} · ${formatMetricValue(getMetricValue(item, metric), metric)} · ${secondary}</span>`;
    }

    function subtractUsageMaps(left = {}, right = {}) {
      const result = {};
      const names = new Set([...Object.keys(left || {}), ...Object.keys(right || {})]);
      for (const name of names) {
        const a = left[name] || {};
        const b = right[name] || {};
        result[name] = {
          count: (Number(a.count) || 0) - (Number(b.count) || 0),
          tokens: (Number(a.tokens) || 0) - (Number(b.tokens) || 0),
          cacheHitCount: getCacheHitCount(a) - getCacheHitCount(b),
          cacheReadInputTokens: getCacheReadInputTokens(a) - getCacheReadInputTokens(b),
          cacheCreationInputTokens: getCacheCreationInputTokens(a) - getCacheCreationInputTokens(b),
        };
      }
      return result;
    }

    function getDeltaRankingSource(kind) {
      const delta = statsView.recentDelta || makeEmptyRecentDelta();
      if (kind === 'lastHour') return { title: '最近 1 小时模型排行', usage: delta.lastHour.models || {} };
      if (kind === 'last24h') return { title: '最近 24 小时模型排行', usage: delta.last24h.models || {} };
      if (kind === 'today') return { title: '今天较昨日模型变化', usage: subtractUsageMaps(delta.today.models || {}, delta.yesterday.models || {}), isDelta: true };
      return { title: '模型排行', usage: {} };
    }

    function showDeltaModelRanking(kind) {
      const metric = getStatsMetric();
      const { title, usage, isDelta } = getDeltaRankingSource(kind);
      const entries = Object.entries(usage || {})
        .filter(([, item]) => isDelta ? Math.abs(getMetricValue(item, metric)) > 0 : getMetricValue(item, metric) > 0)
        .sort((a, b) => Math.abs(getMetricValue(b[1], metric)) - Math.abs(getMetricValue(a[1], metric)))
        .slice(0, 20);
      const maxValue = Math.max(...entries.map(([, item]) => Math.abs(getMetricValue(item, metric))), 1);
      const rows = entries.length ? entries.map(([name, item]) => {
        const value = getMetricValue(item, metric);
        const width = Math.max(3, Math.round((Math.abs(value) / maxValue) * 100));
        const secondary = formatSecondaryMetric(item, metric, true);
        const shownValue = isDelta
          ? formatSignedMetricValue(value, metric)
          : formatMetricValue(value, metric);
        const color = isDelta && value < 0 ? '#f85149' : '#238636';
        return `
      <div class="bar-row">
        <div class="bar-head">
          <span class="bar-name" title="${escapeHtml(name)}">${escapeHtml(name)}</span>
          <span class="bar-main ${isDelta ? deltaClass(value) : ''}">${shownValue}</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${width}%;background:${color}"></div></div>
        <div class="bar-foot">
          <span>${secondary}</span>
          <span>${formatNumber(getCacheHitCount(item))} hit</span>
        </div>
      </div>
    `;
      }).join('') : '<div class="empty">暂无模型数据</div>';
      document.getElementById('modalContent').innerHTML = `
    <h3>${escapeHtml(title)}</h3>
    <div class="hint" style="margin-bottom:10px">当前口径：${escapeHtml(getMetricLabel(metric))}。点击统计页口径下拉可切换排序依据。</div>
    <div class="bar-list">${rows}</div>
    <div class="actions" style="display:flex;justify-content:flex-end;margin-top:12px">
      <button class="btn btn-outline" onclick="closeModal()">关闭</button>
    </div>
  `;
      document.getElementById('modal').classList.add('active');
    }

    function renderTimeChart() {
      const chart = document.getElementById('timeUsageChart');
      const summary = document.getElementById('timeStatsSummary');
      const series = statsView.timeSeries || [];
      const metric = getStatsMetric();
      if (!chart || !summary) return;
      const maxValue = Math.max(...series.map(item => getMetricValue(item, metric)), 0);
      if (!series.length || maxValue <= 0) {
        summary.textContent = `${statsView.label} · ${getMetricLabel(metric)}`;
        chart.innerHTML = '<div class="empty">暂无统计</div>';
        return;
      }
      const totalRequests = series.reduce((sum, item) => sum + (item.requests || 0), 0);
      const totalTokens = series.reduce((sum, item) => sum + (item.tokens || 0), 0);
      const peak = series.reduce((best, item) => getMetricValue(item, metric) > getMetricValue(best, metric) ? item : best, series[0]);
      const first = series[0]?.key || '';
      const last = series[series.length - 1]?.key || '';
      const hourly = series.length === 24 && /T\d{2}$/.test(series[0]?.key || '');
      const labelStep = hourly ? 3 : (series.length > 14 ? Math.ceil(series.length / 10) : 1);
      const summaryRange = hourly && first ? `${first.slice(0, 10)} · 按小时` : (first && last ? `${first} 至 ${last}` : statsView.label);
      summary.textContent = `${summaryRange} · ${getMetricLabel(metric)}`;
      chart.innerHTML = `
    <div class="time-bars">
      ${series.map(item => {
        const value = getMetricValue(item, metric);
        const height = Math.max(2, Math.round((value / maxValue) * 100));
        const title = `${item.key}: ${formatNumber(item.requests)} 次，${formatNumber(item.tokens)} tok`;
        return `<div class="time-bar" title="${escapeHtml(title)}"><div class="time-bar-fill" style="height:${height}%"></div></div>`;
      }).join('')}
    </div>
    <div class="time-axis">
      ${series.map((item, index) => `<span class="${index % labelStep === 0 || index === series.length - 1 ? '' : 'muted'}">${escapeHtml(item.label)}</span>`).join('')}
    </div>
    <div class="time-summary">
      <span><b>${formatNumber(totalRequests)}</b>请求</span>
      <span><b>${formatNumber(totalTokens)}</b>Token</span>
      <span><b>${escapeHtml(peak?.label || '-')}</b>峰值 ${formatMetricValue(getMetricValue(peak, metric), metric)}</span>
    </div>
  `;
    }

    function renderRecentDeltaStats() {
      const el = document.getElementById('recentDelta');
      if (!el) return;
      const delta = statsView.recentDelta || makeEmptyRecentDelta();
      const metric = getStatsMetric();
      const requestDelta = delta.today.requests - delta.yesterday.requests;
      const tokenDelta = delta.today.tokens - delta.yesterday.tokens;
      const todayDelta = metric === 'tokens' ? tokenDelta : requestDelta;
      const lastHourValue = getMetricValue(delta.lastHour, metric);
      const last24hValue = getMetricValue(delta.last24h, metric);
      const lastHourSub = metric === 'tokens'
        ? `${formatNumber(delta.lastHour.requests)} 次 · 失败 ${formatNumber(delta.lastHour.failures)}`
        : `${formatNumber(delta.lastHour.tokens)} tok · 失败 ${formatNumber(delta.lastHour.failures)}`;
      const last24hSub = metric === 'tokens'
        ? `${formatNumber(delta.last24h.requests)} 次 · 失败 ${formatNumber(delta.last24h.failures)}`
        : `${formatNumber(delta.last24h.tokens)} tok · 失败 ${formatNumber(delta.last24h.failures)}`;
      const lastHourModel = formatTopModelLine(delta.lastHour, metric);
      const last24hModel = formatTopModelLine(delta.last24h, metric);
      const todaySub = metric === 'tokens'
        ? `请求 ${formatSignedNumber(requestDelta)} · 今天 ${formatNumber(delta.today.tokens)} tok`
        : `Token ${formatSignedNumber(tokenDelta)} · 今天 ${formatNumber(delta.today.requests)} 次`;
      el.innerHTML = `
    <div class="delta-list">
      <div class="delta-item clickable" onclick="showDeltaModelRanking('lastHour')" title="点击查看模型排行">
        <span class="delta-label">最近 1 小时 ${getMetricLabel(metric)}</span>
        <span class="delta-value">${formatMetricValue(lastHourValue, metric)}</span>
        <span class="delta-sub">${lastHourSub}${lastHourModel}</span>
      </div>
      <div class="delta-item clickable" onclick="showDeltaModelRanking('last24h')" title="点击查看模型排行">
        <span class="delta-label">最近 24 小时 ${getMetricLabel(metric)}</span>
        <span class="delta-value">${formatMetricValue(last24hValue, metric)}</span>
        <span class="delta-sub">${last24hSub}${last24hModel}</span>
      </div>
      <div class="delta-item clickable" onclick="showDeltaModelRanking('today')" title="点击查看模型变化排行">
        <span class="delta-label">今天较昨日</span>
        <span class="delta-value ${deltaClass(todayDelta)}">${formatSignedMetricValue(todayDelta, metric)}</span>
        <span class="delta-sub">${todaySub}</span>
      </div>
      <div class="delta-item">
        <span class="delta-label">最后请求</span>
        <span class="delta-value">${escapeHtml(delta.latestTime || '-')}</span>
        <span class="delta-sub">最近日志窗口内增量</span>
      </div>
    </div>
  `;
    }

    function renderHeaderStats() {
      const keys = Object.keys(channels);
      const enabledChannels = Object.values(channels).filter(c => c.enabled !== false);
      const totalModels = enabledChannels.reduce((s, c) => s + c.models.length, 0);
      const upstreamKeyCount = Object.values(channels).reduce((sum, ch) => sum + getChannelKeys(ch).length, 0);
      const disabledUpstreamKeyCount = Object.values(channels).reduce((sum, ch) => sum + getDisabledKeys(ch).length, 0);
      document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="num">${keys.length}</div><div class="label">总渠道</div></div>
    <div class="stat"><div class="num" style="color:#3fb950">${enabledChannels.length}</div><div class="label">启用渠道</div></div>
    <div class="stat"><div class="num">${upstreamKeyCount}</div><div class="label">上游 Key</div><div class="sub">禁用 ${disabledUpstreamKeyCount}</div></div>
    <div class="stat"><div class="num">${totalModels}</div><div class="label">模型</div></div>
    <div class="stat"><div class="num">${formatCompactNumber(statsView.totalRequests)}</div><div class="label">总请求</div></div>
    <div class="stat"><div class="num">${formatCompactNumber(statsView.totalTokens)}</div><div class="label">Token</div></div>
  `;
    }

    function formatCompactNumber(value) {
      const n = Number(value) || 0;
      const abs = Math.abs(n);
      const compact = (unit, label) => {
        const scaled = n / unit;
        return `${Number(scaled.toFixed(2))}${label}`;
      };
      if (abs >= 1e12) return compact(1e12, '万亿');
      if (abs >= 1e8) return compact(1e8, '亿');
      if (abs >= 1e4) return compact(1e4, '万');
      return n.toLocaleString('zh-CN');
    }

    function renderUsageStats() {
      document.getElementById('statsUpdated').textContent = gatewayStats ? statsView.label : '未加载';
      renderTimeChart();
      renderRecentDeltaStats();
      document.getElementById('modelUsage').innerHTML = formatUsageBars(statsView.modelUsage);
      document.getElementById('channelUsage').innerHTML = formatUsageBars(statsView.channelUsage);
      document.getElementById('ipUsage').innerHTML = formatUsageBars(statsView.ipUsage);
      const recent = statsView.recentLogs || [];
      document.getElementById('recentUsage').innerHTML = recent.length ? recent.slice(0, 20).map(entry => `
    <div class="recent-entry ${entry.success ? '' : 'fail'}">
      <div class="recent-top">
        <span class="recent-model" title="${escapeHtml(entry.model)}">${escapeHtml(entry.model)}</span>
        <span class="recent-time">${escapeHtml(entry.time || '')}</span>
      </div>
      <div class="recent-meta">
        <span>${entry.success ? '成功' : '失败'}</span>
        <span>${escapeHtml(entry.channel)}</span>
        ${entry.clientIp ? `<span>${escapeHtml(entry.clientIp)}</span>` : ''}
        <span>${formatNumber(entry.tokens)} tok</span>
        ${entry.error ? `<span>${escapeHtml(entry.error)}</span>` : ''}
      </div>
    </div>
  `).join('') : '<div class="empty">暂无请求</div>';
    }

    function setChannelFilter(nextFilter) {
      channelFilter = nextFilter || 'all';
      render();
      if (activeChannelTab && channelView === 'keys') {
        void loadActiveChannelKeys({ silent: true });
      }
    }

    function getFilteredChannelEntries() {
      return Object.entries(channels).filter(([, ch]) => {
        const enabled = ch.enabled !== false;
        if (channelFilter === 'enabled') return enabled;
        if (channelFilter === 'disabled') return !enabled;
        return true;
      });
    }

    function renderChannelFilter() {
      const total = Object.keys(channels).length;
      const enabled = Object.values(channels).filter(ch => ch.enabled !== false).length;
      const disabled = total - enabled;
      const options = [
        ['all', '全部', total],
        ['enabled', '启用', enabled],
        ['disabled', '禁用', disabled]
      ];
      document.getElementById('channelFilter').innerHTML = options.map(([value, label, count]) => `
    <button class="filter-btn ${channelFilter === value ? 'active' : ''}" onclick="setChannelFilter(${jsArg(value)})">
      ${label}<span class="filter-count">${count}</span>
    </button>
  `).join('');
    }

    function getChannelFormatLabel(ch = {}) {
      if (ch.format === 'anthropic') return 'Anthropic Messages';
      if (ch.format === 'unlimited_api_chat') return 'Unlimited /api/chat';
      return 'OpenAI 兼容';
    }

    function getLocalChannelKeyDashboard(channelKey = activeChannelTab) {
      const ch = channels[channelKey];
      if (!ch) return null;
      const disabledSet = new Set(getDisabledKeys(ch));
      const forceEnabledSet = new Set(Array.isArray(ch.force_enabled_keys) ? ch.force_enabled_keys : []);
      const metaMap = ch.disabled_key_meta && typeof ch.disabled_key_meta === 'object' ? ch.disabled_key_meta : {};
      const rows = getChannelKeys(ch).map((key, index) => {
        const meta = metaMap[key] || {};
        return {
          id: key, index, key, maskedKey: maskKey(key), enabled: forceEnabledSet.has(key) || !disabledSet.has(key), forceEnabled: forceEnabledSet.has(key),
          disabledReason: meta.reason || '', disabledStatus: meta.status ?? null,
          disabledAt: meta.disabled_at || '', lastError: meta.last_error || '',
          lastErrorAt: meta.last_error_at || '', lastUsedAt: '', lastStatus: null,
          lastTestAt: '', lastTestStatus: null, lastTestPassed: null,
          totalRequests: 0, totalErrors: 0, totalInputTokens: 0, totalOutputTokens: 0,
        };
      });
      return {
        channelKey,
        name: ch.name || channelKey,
        keys: rows,
        totals: rows.reduce((total, row) => ({
          total: total.total + 1,
          enabled: total.enabled + (row.enabled ? 1 : 0),
          disabled: total.disabled + (row.enabled ? 0 : 1),
          requests: total.requests + Number(row.totalRequests || 0),
          errors: total.errors + Number(row.totalErrors || 0),
          inputTokens: total.inputTokens + Number(row.totalInputTokens || 0),
          outputTokens: total.outputTokens + Number(row.totalOutputTokens || 0),
        }), { total: 0, enabled: 0, disabled: 0, requests: 0, errors: 0, inputTokens: 0, outputTokens: 0 }),
      };
    }

    function getCurrentChannelKeyDashboard() {
      return channelKeyDashboard?.channelKey === activeChannelTab
        ? channelKeyDashboard
        : getLocalChannelKeyDashboard(activeChannelTab);
    }

    function syncSelectedChannelKeys() {
      const allowed = new Set((getCurrentChannelKeyDashboard()?.keys || []).map(row => row.key));
      selectedChannelKeys = new Set([...selectedChannelKeys].filter(key => allowed.has(key)));
    }

    async function loadActiveChannelKeys({ silent = false, channelKey = activeChannelTab } = {}) {
      if (!channelKey || !channels[channelKey]) return null;
      const requestSeq = ++channelKeysRequestSeq;
      channelKeysLoading = true;
      renderActiveChannel();
      try {
        const data = await api(`/api/config/channel-keys?channelKey=${encodeURIComponent(channelKey)}`);
        if (requestSeq !== channelKeysRequestSeq || channelKey !== activeChannelTab) return null;
        channelKeyDashboard = data;
        syncSelectedChannelKeys();
        return data;
      } catch (e) {
        if (requestSeq !== channelKeysRequestSeq) return null;
        channelKeyDashboard = getLocalChannelKeyDashboard(channelKey);
        if (!silent) toast(`Key 面板加载失败: ${e.message}`, false);
        return channelKeyDashboard;
      } finally {
        if (requestSeq === channelKeysRequestSeq) {
          channelKeysLoading = false;
          renderActiveChannel();
        }
      }
    }

    function formatChannelDateTime(value) {
      if (!value) return '—';
      const time = Date.parse(value);
      if (!Number.isFinite(time)) return String(value);
      return new Date(time).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false });
    }

    function formatChannelKeyTestState(row = {}) {
      if (row.lastTestPassed === true) return row.lastTestStatus != null ? `通过 · ${row.lastTestStatus}` : '通过';
      if (row.lastTestPassed === false) return row.lastTestStatus != null ? `失败 · ${row.lastTestStatus}` : '失败';
      return '未测试';
    }

    function getVisibleChannelKeyRows() {
      const rows = getCurrentChannelKeyDashboard()?.keys || [];
      const query = String(channelKeySearch || '').trim().toLowerCase();
      return rows.filter(row => {
        if (channelOnlyDisabledKeys && row.enabled) return false;
        if (!query) return true;
        return [row.key, row.maskedKey, row.disabledReason, row.lastError, row.lastStatus, row.lastTestStatus]
          .map(value => String(value ?? '')).join(' ').toLowerCase().includes(query);
      });
    }

    function getSelectedCurrentChannelRows() {
      return (getCurrentChannelKeyDashboard()?.keys || []).filter(row => selectedChannelKeys.has(row.key));
    }

    function handleChannelKeySearch(value) {
      channelKeySearch = String(value || '');
      renderChannelKeysPanel();
    }

    function handleChannelOnlyDisabled(checked) {
      channelOnlyDisabledKeys = checked === true;
      renderChannelKeysPanel();
    }

    function toggleSelectChannelKey(key) {
      if (selectedChannelKeys.has(key)) selectedChannelKeys.delete(key);
      else selectedChannelKeys.add(key);
      renderChannelKeysPanel();
    }

    function toggleSelectAllChannelKeys() {
      const rows = getVisibleChannelKeyRows();
      if (!rows.length) return;
      const allSelected = rows.every(row => selectedChannelKeys.has(row.key));
      rows.forEach(row => allSelected ? selectedChannelKeys.delete(row.key) : selectedChannelKeys.add(row.key));
      renderChannelKeysPanel();
    }

    function switchChannelView(view) {
      if (!['keys', 'models'].includes(view)) return;
      channelView = view;
      renderActiveChannel();
      if (view === 'keys' && !channelKeyDashboard) void loadActiveChannelKeys({ silent: true });
    }

    function render() {
      const keys = Object.keys(channels);
      const filteredEntries = getFilteredChannelEntries();
      renderHeaderStats();
      renderChannelFilter();
      document.getElementById('chCount').textContent = channelFilter === 'all' ? keys.length : `${filteredEntries.length}/${keys.length}`;

      if (!filteredEntries.some(([ckey]) => ckey === activeChannelTab)) {
        activeChannelTab = filteredEntries[0]?.[0] || '';
        channelModelSearch = '';
        channelKeySearch = '';
        channelOnlyDisabledKeys = false;
        selectedChannelKeys = new Set();
        channelKeyDashboard = null;
      }
      renderChannelTabs(filteredEntries);
      renderActiveChannel();
    }

    function renderChannelTabs(filteredEntries) {
      const tabsEl = document.getElementById('channelTabs');
      if (!tabsEl) return;
      if (!filteredEntries.length) { tabsEl.innerHTML = ''; tabsEl.style.display = 'none'; return; }
      tabsEl.style.display = '';
      tabsEl.innerHTML = filteredEntries.map(([ckey, ch]) => {
        const enabled = ch.enabled !== false;
        const totalKeys = getChannelKeys(ch).length;
        const disabledKeys = getDisabledKeys(ch).length;
        const countLabel = disabledKeys ? `${Math.max(totalKeys - disabledKeys, 0)}/${totalKeys}` : String(totalKeys);
        return `<button class="channel-tab ${ckey === activeChannelTab ? 'active' : ''} ${enabled ? '' : 'ch-disabled'}" onclick="switchChannelTab(${jsArg(ckey)})" title="${escapeHtml(ch.base_url || '')}">
      <span class="dot"></span><span>${escapeHtml(ch.name || ckey)}</span><span class="channel-tab-count">${escapeHtml(countLabel)}</span>
    </button>`;
      }).join('');
    }

    async function switchChannelTab(ckey) {
      if (!channels[ckey] || ckey === activeChannelTab) return;
      activeChannelTab = ckey;
      channelModelSearch = '';
      channelKeySearch = '';
      channelOnlyDisabledKeys = false;
      selectedChannelKeys = new Set();
      channelKeyDashboard = null;
      renderChannelTabs(getFilteredChannelEntries());
      renderActiveChannel();
      if (channelView === 'keys') await loadActiveChannelKeys({ silent: true });
    }

    function getVisibleChannelModels(ch = {}) {
      const q = String(channelModelSearch || '').trim().toLowerCase();
      const models = ch.models || [];
      if (!q) return models;
      return models.filter(m => String(m).toLowerCase().includes(q));
    }

    function handleChannelModelSearch(value) {
      channelModelSearch = value;
      renderChannelModels();
    }

    function renderChannelModels() {
      const ch = channels[activeChannelTab];
      const panel = document.getElementById('channelModelsPanel');
      if (!ch || !panel) return;
      const total = (ch.models || []).length;
      const visible = getVisibleChannelModels(ch);
      panel.innerHTML = `
    <div class="model-toolbar">
      <button class="btn btn-primary" onclick="addModel(${jsArg(activeChannelTab)})">+ 添加模型</button>
      <span class="selection-count">${visible.length}/${total} 模型</span>
    </div>
    <div class="model-filter-bar">
      <input id="channelModelSearchInput" placeholder="🔍 筛选模型..." value="${escapeHtml(channelModelSearch)}" oninput="handleChannelModelSearch(this.value)">
      <span class="channel-info">${visible.length}/${total} 模型</span>
    </div>
    <div class="model-list-dashboard">
      ${visible.length
          ? visible.map(model => `<span class="model-tag">${escapeHtml(model)}<span class="del" onclick="removeModel(${jsArg(activeChannelTab)},${jsArg(model)})">×</span></span>`).join('')
          : `<div class="empty" style="padding:16px 0;width:100%">${total ? '没有匹配的模型' : '当前渠道还没有模型'}</div>`}
      <span class="model-add" onclick="addModel(${jsArg(activeChannelTab)})">+ 添加模型</span>
    </div>`;
    }

    async function refreshActiveChannelKeys() {
      await loadActiveChannelKeys({ silent: false });
    }

    function downloadChannelKeys(filename, keys) {
      const blob = new Blob([keys.join('\n') + (keys.length ? '\n' : '')], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function exportActiveChannelKeys(only = 'all') {
      const rows = getCurrentChannelKeyDashboard()?.keys || [];
      const filtered = only === 'enabled'
        ? rows.filter(row => row.enabled)
        : only === 'disabled'

    async function startChannelBatchTest() {
      if (channelBatchRunning) return;
      const selected = getSelectedCurrentChannelRows();
      const targets = selected.length ? selected : getVisibleChannelKeyRows();
      if (!targets.length) return;
      const button = document.getElementById('channelBatchStartBtn');
      const progress = document.getElementById('channelBatchProgress');
      const bar = document.getElementById('channelBatchProgressBar');
      const status = document.getElementById('channelBatchStatus');
      const results = document.getElementById('channelBatchResults');
      const model = document.getElementById('channelBatchModel')?.value || '';
      if (!model) { toast('请选择测试模型', false); return; }
      channelBatchRunning = true;
      if (button) button.disabled = true;
      if (progress) progress.style.display = '';
      if (bar) bar.style.width = '15%';
      if (status) status.textContent = `正在用 ${model} 测试 ${targets.length} 个 Key...`;
      try {
        const data = await api('/api/config/channel-keys/batch-test', {
          method: 'POST',
          body: JSON.stringify({
            channelKey: activeChannelTab,
            model,
            keys: targets.map(row => row.key),
            concurrency: Math.min(Math.max(Number(document.getElementById('channelBatchConcurrency')?.value) || 5, 1), 20),
            autoDisable: document.getElementById('channelBatchAutoDisable')?.checked !== false,
            reenable: document.getElementById('channelBatchReenable')?.checked === true,
          })
        });
        if (bar) bar.style.width = '100%';
        if (status) status.textContent = `完成（${data.model || model}）：通过 ${data.summary?.pass || 0}，失败 ${data.summary?.fail || 0}`;
        if (results) results.innerHTML = (data.results || []).map(item => `<div class="batch-result-row ${item.pass ? 'pass' : 'fail'}"><strong>${escapeHtml(maskKey(item.key))}</strong><span>${item.pass ? '✅ 通过' : '❌ 失败'}</span><span style="flex:1">${escapeHtml(item.pass ? (item.reply || '(ok)') : (item.error || item.reason || '测试失败'))}</span></div>`).join('');
        await load();
      } catch (e) {
        if (status) status.textContent = `测试失败：${e.message}`;
        toast(`批量测试失败: ${e.message}`, false);
      } finally {
        channelBatchRunning = false;
        if (button) button.disabled = false;
      }
    }

    async function probeModels() {
      const url = document.getElementById('chUrl').value.trim();
      const key = document.getElementById('chKey')?.value.trim() || parseKeyList(document.getElementById('chKeys')?.value || '')[0] || (editingKey ? getChannelKeys(channels[editingKey])[0] : '') || '';
      const format = document.getElementById('chFormat')?.value || channels[editingKey]?.format || '';
      const result = document.getElementById('probeResult');
      const picker = document.getElementById('modelPicker');

      if (!url || !key) { result.textContent = '请先填地址和Key'; return; }
      result.textContent = '探测中...';

      try {
        const resp = await fetch('/api/probe-models', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ base_url: url, key, format, channelKey: editingKey || '' })
        });
        const d = await resp.json();
        if (!d.ok || !d.models) { result.textContent = '❌ 探测失败: ' + (d.error || ''); resetProbeModelPicker(); picker.style.display = 'none'; return; }
        if (d.models.length === 0) { result.textContent = '⚠️ 上游无模型'; resetProbeModelPicker(); picker.style.display = 'none'; return; }
        result.textContent = `✅ 发现 ${d.models.length} 个模型`;
        probedUpstreamModels = d.models;
        selectedProbedModels = new Set();
        picker.style.display = 'block';
        renderProbeModelPicker();
      } catch (e) { result.textContent = '❌ 探测失败: ' + e.message; resetProbeModelPicker(); picker.style.display = 'none'; }
    }

    function resetProbeModelPicker() {
      probedUpstreamModels = [];
      selectedProbedModels = new Set();
      const picker = document.getElementById('modelPicker');
      if (picker) picker.innerHTML = '';
    }

    function renderProbeModelPicker() {
      const picker = document.getElementById('modelPicker');
      if (!picker) return;
      picker.innerHTML = `
    <div class="model-picker-toolbar">
      <input class="model-search-input" id="modelProbeSearch" placeholder="搜索模型名..." oninput="filterProbeModelPicker(this.value)">
      <button class="btn btn-outline btn-sm" onclick="selectVisibleProbeModels(true)">全选当前</button>
      <button class="btn btn-outline btn-sm" onclick="selectVisibleProbeModels(false)">清空当前</button>
      <span class="model-picker-summary" id="modelProbeSummary"></span>
    </div>
    <div id="modelProbeList"></div>
  `;
      filterProbeModelPicker('');
    }

    function getVisibleProbeModels(query = '') {
      const q = query.trim().toLowerCase();
      if (!q) return probedUpstreamModels;
      return probedUpstreamModels.filter(model => String(model).toLowerCase().includes(q));
    }

    function filterProbeModelPicker(query = '') {
      const list = document.getElementById('modelProbeList');
      const summary = document.getElementById('modelProbeSummary');
      if (!list) return;
      const visibleModels = getVisibleProbeModels(query);
      if (summary) {
        summary.textContent = `${visibleModels.length}/${probedUpstreamModels.length} 匹配 · 已选 ${selectedProbedModels.size}`;
      }
      if (!visibleModels.length) {
        list.innerHTML = '<div class="model-picker-empty">没有匹配的模型</div>';
        return;
      }
      list.innerHTML = visibleModels.map(model => `
    <label>
      <input type="checkbox" value="${escapeHtml(model)}" ${selectedProbedModels.has(model) ? 'checked' : ''} onchange="handleProbeModelToggle(this.value, this.checked)">
      ${escapeHtml(model)}
    </label>
  `).join('');
    }

    function handleProbeModelToggle(model, checked) {
      if (checked) selectedProbedModels.add(model);
      else selectedProbedModels.delete(model);
      const summary = document.getElementById('modelProbeSummary');
      const search = document.getElementById('modelProbeSearch');
      if (summary) {
        const visibleCount = getVisibleProbeModels(search?.value || '').length;
        summary.textContent = `${visibleCount}/${probedUpstreamModels.length} 匹配 · 已选 ${selectedProbedModels.size}`;
      }
      updateModelInput();
    }

    function selectVisibleProbeModels(checked) {
      const search = document.getElementById('modelProbeSearch');
      const query = search?.value || '';
      getVisibleProbeModels(query).forEach(model => {
        if (checked) selectedProbedModels.add(model);
        else selectedProbedModels.delete(model);
      });
      filterProbeModelPicker(query);
      updateModelInput();
    }

    function updateModelInput() {
      const prefix = getCurrentModelPrefix();
      const pickedModels = probedUpstreamModels.length
        ? probedUpstreamModels.filter(model => selectedProbedModels.has(model))
        : [...document.querySelectorAll('#modelPicker input:checked')].map(c => c.value);
      const checked = pickedModels.map(model => {
        const bare = stripOwnModelPrefix(model, prefix);
        return prefix ? `[${prefix}]${bare}` : model;
      });
      document.getElementById('chModels').value = checked.join(', ');
    }

    function editChannel(ckey) {
      editingKey = ckey;
      const ch = channels[ckey];
      const modelPrefix = getChannelModelPrefix(ckey, ch);
      document.getElementById('modalContent').innerHTML = `
    <h3>编辑渠道</h3>
    <label>渠道名称</label>
    <input id="chName" value="${escapeHtml(ch.name)}">
    <label>前缀 (模型名显示前缀)</label>
    <input id="chPrefix" value="${escapeHtml(modelPrefix)}" placeholder="例如: ds (留空=不添加前缀)">
    <div class="hint">留空时模型名不加前缀；渠道内部 key 会保持不变。</div>
    <label>API 地址</label>
    <input id="chUrl" value="${escapeHtml(ch.base_url || '')}">
    <label>官网地址（可选）</label>
    <input id="chWebsite" value="${escapeHtml(ch.website || '')}" placeholder="https://example.com">
    <div class="hint">填写后渠道会显示一个直达官网的按钮。</div>
    <label>Key 管理</label>
    <div id="chKeyList"></div>
    <label class="checkbox-label">
      <input id="chEnabled" type="checkbox" ${ch.enabled === false ? '' : 'checked'}>
      启用渠道
    </label>
	    <label>上游格式</label>
	    <select id="chFormat" onchange="toggleAnthropicFields()">
	      <option value="" ${!ch.format ? 'selected' : ''}>OpenAI 兼容</option>
	      <option value="anthropic" ${ch.format === 'anthropic' ? 'selected' : ''}>Anthropic Messages API</option>
	      <option value="unlimited_api_chat" ${ch.format === 'unlimited_api_chat' ? 'selected' : ''}>Unlimited /api/chat</option>
	    </select>
    <label class="checkbox-label">
      <input id="chPromptCacheEnabled" type="checkbox" ${ch.prompt_cache_enabled ? 'checked' : ''}>
      开启 Prompt Cache
    </label>
    <label>缓存时长</label>
    <select id="chPromptCacheTtl">
      <option value="1h" ${ch.prompt_cache_ttl !== '5m' ? 'selected' : ''}>1 小时（写入成本更高）</option>
      <option value="5m" ${ch.prompt_cache_ttl === '5m' ? 'selected' : ''}>5 分钟</option>
    </select>
    <div class="hint">Anthropic 格式会转为 /messages cache_control；OpenAI 兼容格式会把 cache_control 加到可复用消息的 content block 上，仅给支持该字段的 Claude 代理开启。</div>
    <div id="anthropicFields" style="display:${ch.format === 'anthropic' ? 'block' : 'none'}">
      <label>Anthropic Version</label>
      <input id="chAnthropicVersion" value="${ch.anthropic_version || '2023-06-01'}">
      <label>Thinking 模式</label>
      <select id="chThinkingType" onchange="toggleThinkingFields()">
        <option value="off" ${!ch.anthropic_thinking_type ? 'selected' : ''}>关闭</option>
        <option value="enabled" ${ch.anthropic_thinking_type === 'enabled' ? 'selected' : ''}>enabled + budget_tokens</option>
        <option value="adaptive" ${ch.anthropic_thinking_type === 'adaptive' ? 'selected' : ''}>adaptive + effort</option>
      </select>
      <div id="thinkingBudgetFields" style="display:${ch.anthropic_thinking_type === 'enabled' ? 'block' : 'none'}">
        <label>Budget Tokens</label>
        <input id="chThinkingBudget" type="number" min="1024" step="1024" value="${ch.anthropic_thinking_budget_tokens || 32000}">
        <div class="hint">会发送 thinking: {type:"enabled", budget_tokens:N}。如果 max_tokens 小于预算，会自动抬到 N+1024。</div>
      </div>
      <div id="thinkingAdaptiveFields" style="display:${ch.anthropic_thinking_type === 'adaptive' ? 'block' : 'none'}">
        <label>Effort</label>
        <select id="chOutputEffort">
          <option value="" ${!ch.anthropic_output_effort ? 'selected' : ''}>不设置</option>
          <option value="low" ${ch.anthropic_output_effort === 'low' ? 'selected' : ''}>low</option>
          <option value="medium" ${ch.anthropic_output_effort === 'medium' ? 'selected' : ''}>medium</option>
          <option value="high" ${ch.anthropic_output_effort === 'high' ? 'selected' : ''}>high</option>
          <option value="xhigh" ${ch.anthropic_output_effort === 'xhigh' ? 'selected' : ''}>xhigh</option>
          <option value="max" ${ch.anthropic_output_effort === 'max' ? 'selected' : ''}>max</option>
        </select>
        <label>Thinking Display</label>
        <select id="chThinkingDisplay">
          <option value="" ${!ch.anthropic_thinking_display ? 'selected' : ''}>默认</option>
          <option value="omitted" ${ch.anthropic_thinking_display === 'omitted' ? 'selected' : ''}>omitted</option>
          <option value="summarized" ${ch.anthropic_thinking_display === 'summarized' ? 'selected' : ''}>summarized</option>
        </select>
        <div class="hint">会发送 thinking: {type:"adaptive"}，并可附加 output_config.effort。</div>
      </div>
    </div>
    <div style="margin-top:10px">
      <button class="btn btn-outline btn-sm" onclick="probeModels()">🔍 探测上游模型</button>
      <span id="probeResult" style="font-size:13px;color:#8b949e;margin-left:8px"></span>
    </div>
    <div class="model-picker" id="modelPicker" style="display:none"></div>
    <label>模型列表 (逗号分隔)</label>
    <input id="chModels" value="${ch.models.join(', ')}">
    <div class="actions">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveChannel()">保存</button>
    </div>`;
      document.getElementById('modal').classList.add('active');
      renderKeyListInEdit();
    }

    function toggleAnthropicFields() {
      const fields = document.getElementById('anthropicFields');
      const format = document.getElementById('chFormat')?.value || '';
      if (fields) fields.style.display = format === 'anthropic' ? 'block' : 'none';
      toggleThinkingFields();
    }

    function toggleThinkingFields() {
      const type = document.getElementById('chThinkingType')?.value || 'off';
      const budgetFields = document.getElementById('thinkingBudgetFields');
      const adaptiveFields = document.getElementById('thinkingAdaptiveFields');
      if (budgetFields) budgetFields.style.display = type === 'enabled' ? 'block' : 'none';
      if (adaptiveFields) adaptiveFields.style.display = type === 'adaptive' ? 'block' : 'none';
    }

    function collectChannelOptions() {
      const format = document.getElementById('chFormat')?.value || '';
      const enabled = document.getElementById('chEnabled')?.checked !== false;
      const promptCacheEnabled = Boolean(document.getElementById('chPromptCacheEnabled')?.checked);
      const thinkingType = format === 'anthropic' ? (document.getElementById('chThinkingType')?.value || 'off') : 'off';
      const thinkingBudget = Number(document.getElementById('chThinkingBudget')?.value || 32000);
      const outputEffort = document.getElementById('chOutputEffort')?.value || '';
      const thinkingDisplay = document.getElementById('chThinkingDisplay')?.value || '';
      return {
        enabled,
        ...(format ? { format } : {}),
        ...(format === 'anthropic' ? { anthropic_version: document.getElementById('chAnthropicVersion')?.value.trim() || '2023-06-01' } : {}),
        prompt_cache_enabled: promptCacheEnabled,
        prompt_cache_ttl: promptCacheEnabled ? (document.getElementById('chPromptCacheTtl')?.value || '1h') : '1h',
        anthropic_thinking_type: thinkingType,
        anthropic_thinking_budget_tokens: thinkingBudget,
        anthropic_output_effort: outputEffort,
        anthropic_thinking_display: thinkingDisplay,
      };
    }

    async function saveChannel() {
      const name = document.getElementById('chName').value.trim();
      const prefix = document.getElementById('chPrefix')?.value.trim() || '';
      const url = document.getElementById('chUrl').value.trim();
      const website = document.getElementById('chWebsite')?.value.trim() || '';
      const key = document.getElementById('chKey')?.value.trim() || '';
      const upstreamKeys = editingKey
        ? getChannelKeys(channels[editingKey])
        : parseKeyList([key, document.getElementById('chKeys')?.value || ''].filter(Boolean).join('\n'));
      const models = document.getElementById('chModels').value.split(',').map(m => m.trim()).filter(Boolean);
      const channelOptions = collectChannelOptions();

      if (!name || !url) { toast('名称和地址必填', false); return; }
      if (!editingKey && upstreamKeys.length === 0) { toast('新渠道必须填写至少一个 API Key', false); return; }
      if (models.length === 0) { toast('至少填一个模型', false); return; }

      // Determine channel key
      let ckey;
      if (!editingKey) {
        ckey = prefix || makeChannelKey(name, url);
        // Re-apply only this gateway's wrapper; keep upstream provider tags.
        const finalModels = normalizeModelsForPrefix(models, prefix);
        document.getElementById('chModels').value = finalModels.join(', ');
        // Save with raw key
        try {
          const res = await api('/api/config/save', {
            method: 'POST',
            body: JSON.stringify({
              channelKey: ckey,
              name, base_url: url,
              website,
              key: upstreamKeys[0] || key,
              keys: upstreamKeys,
              models: finalModels,
              model_prefix: prefix,
              ...channelOptions,
              isNew: true,
            })
          });
          if (res.ok) { toast('渠道已添加'); closeModal(); await load(); }
          else toast(res.error || '保存失败', false);
        } catch (e) { toast('保存失败: ' + e.message, false); }
        return;
      }

      ckey = prefix || editingKey || makeChannelKey(name, url);
      const previousPrefix = getChannelModelPrefix(editingKey, channels[editingKey] || {});
      const finalModels = normalizeModelsForPrefix(models, prefix, previousPrefix);
      document.getElementById('chModels').value = finalModels.join(', ');

      try {
        const res = await api('/api/config/save', {
          method: 'POST',
          body: JSON.stringify({
            previousChannelKey: editingKey,
            channelKey: ckey,
            name, base_url: url,
            website,
            key: upstreamKeys[0] || key || channels[editingKey]?.key,
            keys: upstreamKeys.length ? upstreamKeys : getChannelKeys(channels[editingKey]),
            models: finalModels,
            model_prefix: prefix,
            ...channelOptions,
            isNew: false,
          })
        });
        if (res.ok) { toast('渠道已更新'); closeModal(); await load(); }
        else toast(res.error || '保存失败', false);
      } catch (e) { toast('保存失败: ' + e.message, false); }
    }

    function closeModal() {
      const modal = document.getElementById('modal');
      modal.classList.remove('active');
      modal.style.display = '';
    }

    async function deleteChannel(ckey) {
      if (!confirm(`确定删除渠道 "${channels[ckey].name}"？`)) return;
      try {
        const res = await api('/api/config/delete', {
          method: 'POST',
          body: JSON.stringify({ channelKey: ckey })
        });
        if (res.ok) { toast('已删除'); await load(); }
        else toast(res.error || '删除失败', false);
      } catch (e) { toast('删除失败', false); }
    }

    async function setChannelEnabled(ckey, enabled) {
      const ch = channels[ckey];
      if (!ch) return;
      const action = enabled ? '启用' : '禁用';
      if (!confirm(`确定${action}渠道 "${ch.name}"？`)) return;
      try {
        const res = await api('/api/config/channel-enabled', {
          method: 'POST',
          body: JSON.stringify({ channelKey: ckey, enabled })
        });
        if (res.ok) { toast(`渠道已${action}`); await load(); }
        else toast(res.error || `${action}失败`, false);
      } catch (e) { toast(`${action}失败: ` + e.message, false); }
    }

    async function removeModel(ckey, model) {
      try {
        const res = await api('/api/config/remove-model', {
          method: 'POST',
          body: JSON.stringify({ channelKey: ckey, model })
        });
        if (res.ok) { toast('模型已移除'); await load(); }
        else toast(res.error || '失败', false);
      } catch (e) { toast('失败', false); }
    }

    async function addModel(ckey) {
      const model = prompt(`给 ${channels[ckey].name} 添加模型名：`);
      if (!model) return;
      try {
        const res = await api('/api/config/add-model', {
          method: 'POST',
          body: JSON.stringify({ channelKey: ckey, model })
        });
        if (res.ok) { toast('模型已添加'); await load(); }
        else toast(res.error || '失败', false);
      } catch (e) { toast('失败', false); }
    }

    async function testChannel(ckey) {
      toast('测试中...');
      try {
        const resp = await fetch('/api/test-channel', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ channelKey: ckey })
        });
        const d = await resp.json();
        if (d.ok) toast(`✅ ${ckey} 正常: ${d.reply}`);
        else toast(`❌ ${ckey}: ${d.error || '未知错误'}`, false);
      } catch (e) { toast(`❌ ${ckey}: ${e.message}`, false); }
    }

    // ==================== Channel Key 管理（编辑弹窗内嵌） ====================

    function renderKeyListInEdit() {
      if (!editingKey) return;
      const ch = channels[editingKey];
      if (!ch) return;
      const container = document.getElementById('chKeyList');
      if (!container) return;
      const allKeys = getChannelKeys(ch);
      const disabledSet = new Set(getDisabledKeys(ch));

      const keyRows = allKeys.map(key => {
        const isDisabled = disabledSet.has(key);
        return `
      <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #21262d">
        <code style="flex:1;word-break:break-all;color:#79c0ff;font-size:13px">${escapeHtml(maskKey(key))}</code>
        <span style="font-size:12px;padding:2px 8px;border-radius:4px;${isDisabled ? 'background:#da3633;color:#fff' : 'background:#238636;color:#fff'}">${isDisabled ? '禁用' : '启用'}</span>
        <button class="btn btn-outline btn-sm" onclick="testChannelKey(${jsArg(key)})">测试</button>
        ${isDisabled
            ? `<button class="btn btn-outline btn-sm" onclick="enableChannelKey(${jsArg(key)})">启用</button>`
            : `<button class="btn btn-outline btn-sm" onclick="disableChannelKey(${jsArg(key)})">禁用</button>`
          }
        <button class="btn btn-danger btn-sm" onclick="deleteChannelKey(${jsArg(key)})">删除</button>
      </div>`;
      }).join('');

      container.innerHTML = `
    <div class="hint" style="margin-bottom:4px">共 ${allKeys.length} 个 Key，${allKeys.length - disabledSet.size} 个启用，${disabledSet.size} 个禁用</div>
    ${keyRows || '<div class="empty" style="padding:8px">暂无 Key</div>'}
    <div style="margin-top:8px">
      <textarea id="keyImportArea" placeholder="导入 Key，每行一个" style="width:100%;min-height:50px;font-family:monospace;font-size:13px"></textarea>
      <button class="btn btn-primary btn-sm" style="margin-top:4px" onclick="importChannelKeys()">导入</button>
    </div>`;
    }

    async function testChannelKey(key) {
      toast('测试 Key...');
      try {
        const resp = await fetch('/api/config/channel-keys/test', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ channelKey: editingKey, key })
        });
        const d = await resp.json();
        if (d.pass) toast(`✅ ${maskKey(key)} 正常: ${d.reply || '(ok)'}`);
        else toast(`❌ ${maskKey(key)}: ${d.error || '未知错误'}`, false);
      } catch (e) { toast(`❌ ${maskKey(key)}: ${e.message}`, false); }
    }

    async function disableChannelKey(key) {
      try {
        const res = await api('/api/config/channel-keys/disable', {
          method: 'POST', body: JSON.stringify({ channelKey: editingKey, key })
        });
        if (res.ok) { toast('已禁用'); await load(); renderKeyListInEdit(); }
        else toast(res.error || '失败', false);
      } catch (e) { toast('失败: ' + e.message, false); }
    }

    async function enableChannelKey(key) {
      try {
        const res = await api('/api/config/channel-keys/enable', {
          method: 'POST', body: JSON.stringify({ channelKey: editingKey, key })
        });
        if (res.ok) { toast('已启用'); await load(); renderKeyListInEdit(); }
        else toast(res.error || '失败', false);
      } catch (e) { toast('失败: ' + e.message, false); }
    }

    async function deleteChannelKey(key) {
      if (!confirm(`确定删除 Key ${maskKey(key)}？`)) return;
      try {
        const res = await api('/api/config/channel-keys/delete', {
          method: 'POST', body: JSON.stringify({ channelKey: editingKey, key })
        });
        if (res.ok) { toast('已删除'); await load(); renderKeyListInEdit(); }
        else toast(res.error || '失败', false);
      } catch (e) { toast('失败: ' + e.message, false); }
    }

    async function importChannelKeys() {
      const text = document.getElementById('keyImportArea')?.value || '';
      if (!text.trim()) { toast('请输入 Key', false); return; }
      try {
        const res = await api('/api/config/channel-keys/import', {
          method: 'POST', body: JSON.stringify({ channelKey: editingKey, keys: text })
        });
        if (res.ok) {
          toast(`已导入 ${res.added || 0} 个新 Key（共 ${res.total} 个）`);
          await load();
          renderKeyListInEdit();
        } else toast(res.error || '导入失败', false);
      } catch (e) { toast('导入失败: ' + e.message, false); }
    }

    const modalOverlay = document.getElementById('modal');
    let modalPointerStartedOnOverlay = false;

    modalOverlay.addEventListener('pointerdown', e => {
      modalPointerStartedOnOverlay = e.target === modalOverlay;
    });

    modalOverlay.addEventListener('pointerup', e => {
      const selectedText = window.getSelection()?.toString() || '';
      if (modalPointerStartedOnOverlay && e.target === modalOverlay && !selectedText) closeModal();
      modalPointerStartedOnOverlay = false;
    });

    load();
  </script>
</body>

</html>
