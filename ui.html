<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聚合渠道</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px
    }

    h1 {
      font-size: 26px;
      color: #58a6ff;
      margin-bottom: 4px
    }

    .subtitle {
      color: #8b949e;
      font-size: 16px;
      margin-bottom: 20px
    }

    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap
    }

    .stat {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 16px;
      min-width: 90px
    }

    .stat .num {
      font-size: 26px;
      font-weight: 700;
      color: #58a6ff
    }

    .stat .label {
      font-size: 13px;
      color: #8b949e;
      margin-top: 2px
    }

    .stat .sub {
      font-size: 12px;
      color: #484f58;
      margin-top: 2px
    }

    .endpoint {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 20px
    }

    .endpoint h2 {
      font-size: 17px;
      color: #58a6ff;
      margin-bottom: 10px
    }

    .endpoint code {
      background: #0d1117;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 14px;
      color: #79c0ff;
      word-break: break-all
    }

    .endpoint .row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin: 6px 0
    }

    .endpoint .col {
      flex: 1;
      min-width: 200px
    }

    .endpoint .col label {
      font-size: 13px;
      color: #8b949e;
      display: block;
      margin-bottom: 2px
    }

    .section-title {
      font-size: 18px;
      color: #f0f6fc;
      margin: 24px 0 12px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .section-title .badge {
      background: #238636;
      color: #fff;
      font-size: 13px;
      padding: 2px 8px;
      border-radius: 10px
    }

    .tabs {
      display: flex;
      gap: 8px;
      border-bottom: 1px solid #30363d;
      margin: 0 0 18px;
      overflow-x: auto
    }

    .tab-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: #8b949e;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      padding: 10px 14px;
      white-space: nowrap
    }

    .tab-btn:hover {
      color: #c9d1d9;
      background: #161b22
    }

    .tab-btn.active {
      color: #58a6ff;
      border-bottom-color: #58a6ff
    }

    .tab-panel {
      display: none
    }

    .tab-panel.active {
      display: block
    }

    .tab-panel .section-title {
      margin-top: 0
    }

    .btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      transition: all .15s
    }

    .btn-primary {
      background: #238636;
      color: #fff
    }

    .btn-primary:hover {
      background: #2ea043
    }

    .btn-danger {
      background: #da3633;
      color: #fff
    }

    .btn-danger:hover {
      background: #f85149
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #30363d;
      color: #c9d1d9
    }

    .btn-outline:hover {
      background: #1f2937
    }

    .btn-sm {
      padding: 3px 10px;
      font-size: 13px
    }

    .channel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 10px;
      min-width: 0;
      overflow: hidden
    }

    .channel.disabled {
      opacity: .64;
      border-color: #484f58
    }

    .channel-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
      min-width: 0
    }

    .channel-main {
      min-width: 0;
      flex: 1 1 auto
    }

    .channel-title {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0
    }

    .channel-name {
      font-size: 17px;
      font-weight: 600;
      color: #f0f6fc
    }

    .channel-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      min-width: 0;
      margin-top: 2px
    }

    .channel-info {
      font-size: 13px;
      color: #8b949e;
      min-width: 0;
      overflow-wrap: anywhere
    }

    .channel-badge {
      display: inline-flex;
      align-items: center;
      border: 1px solid #484f58;
      border-radius: 999px;
      padding: 1px 7px;
      font-size: 12px;
      color: #8b949e
    }

    .channel-badge.disabled {
      border-color: #f85149;
      color: #f85149
    }

    .channel-filter {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      margin: -2px 0 12px
    }

    .channel-filter .filter-btn {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 999px;
      color: #8b949e;
      cursor: pointer;
      font-size: 14px;
      padding: 5px 12px;
      white-space: nowrap
    }

    .channel-filter .filter-btn:hover {
      background: #161b22;
      color: #c9d1d9
    }

    .channel-filter .filter-btn.active {
      background: #1f6feb;
      border-color: #58a6ff;
      color: #fff
    }

    .channel-filter .filter-count {
      font-size: 12px;
      opacity: .78;
      margin-left: 4px
    }

    .channel-subtabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      margin: 0 0 12px;
      padding-bottom: 4px;
      border-bottom: 1px solid #21262d;
      flex-wrap: nowrap
    }

    .channel-tab {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 999px;
      color: #8b949e;
      cursor: pointer;
      font-size: 14px;
      padding: 6px 12px;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0
    }

    .channel-tab:hover {
      background: #161b22;
      color: #c9d1d9
    }

    .channel-tab.active {
      background: #1f6feb;
      border-color: #58a6ff;
      color: #fff
    }

    .channel-tab.ch-disabled {
      opacity: .65
    }

    .channel-tab .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #3fb950;
      display: inline-block;
      flex-shrink: 0
    }

    .channel-tab.ch-disabled .dot {
      background: #f85149
    }

    .channel-model-tools {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin: -4px 0 12px
    }

    .channel-model-tools input {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 14px;
      padding: 6px 10px;
      min-width: 220px;
      max-width: 100%;
      flex: 1
    }

    .channel-model-tools input:focus {
      outline: none;
      border-color: #58a6ff
    }

    .channel-actions {
      display: flex;
      gap: 6px;
      flex: 0 0 auto;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: 100%
    }

    .channel-actions .btn {
      white-space: nowrap
    }

    .models {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 8px;
      min-width: 0
    }

    .model-tag {
      background: #1f2937;
      color: #c9d1d9;
      font-size: 13px;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 4px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .model-tag .del {
      color: #f85149;
      cursor: pointer;
      font-weight: 700;
      margin-left: 2px;
      opacity: 0;
      transition: opacity .15s
    }

    .model-tag:hover .del {
      opacity: 1
    }

    .model-add {
      background: transparent;
      border: 1px dashed #30363d;
      color: #58a6ff;
      font-size: 13px;
      padding: 3px 10px;
      border-radius: 10px;
      cursor: pointer
    }

    .model-add:hover {
      background: #1f2937
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 100;
      align-items: center;
      justify-content: center
    }

    .modal-overlay.active {
      display: flex
    }

    .modal {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px 24px;
      max-width: 580px;
      width: 92%;
      max-height: 80vh;
      overflow-y: auto
    }

    .modal h3 {
      font-size: 18px;
      color: #f0f6fc;
      margin-bottom: 14px
    }

    .modal label {
      font-size: 14px;
      color: #8b949e;
      display: block;
      margin: 10px 0 3px
    }

    .modal input,
    .modal select,
    .modal textarea {
      width: 100%;
      padding: 8px 10px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 15px
    }

    .modal textarea {
      min-height: 78px;
      resize: vertical;
      font-family: inherit
    }

    .modal input:focus,
    .modal select:focus,
    .modal textarea:focus {
      outline: none;
      border-color: #58a6ff
    }

    .modal .hint {
      font-size: 13px;
      color: #484f58;
      margin-top: 2px
    }

    .modal .checkbox-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: #c9d1d9;
      margin: 8px 0;
      cursor: pointer
    }

    .modal .checkbox-label input {
      width: auto
    }

    .modal .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px
    }

    .model-picker {
      max-height: 180px;
      overflow-y: auto;
      border: 1px solid #30363d;
      border-radius: 6px;
      margin: 8px 0;
      padding: 6px
    }

    .model-picker-toolbar {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      background: #161b22;
      padding: 2px 0 8px;
      margin-bottom: 4px;
      z-index: 1
    }

    .model-picker-toolbar input {
      flex: 1 1 180px;
      min-width: 0
    }

    .model-picker-summary {
      font-size: 12px;
      color: #8b949e;
      white-space: nowrap
    }

    .model-picker-empty {
      padding: 12px;
      color: #484f58;
      text-align: center;
      font-size: 13px
    }

    .model-picker label {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 6px;
      border-radius: 4px;
      cursor: pointer;
      margin: 0;
      font-size: 14px;
      color: #c9d1d9
    }

    .model-picker label:hover {
      background: #1f2937
    }

    .model-picker input {
      width: auto
    }

    .model-picker .model-search-input {
      width: auto
    }

    .model-picker .count {
      font-size: 13px;
      color: #484f58;
      margin-left: auto
    }

    .stats-panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px 18px;
      margin-top: 12px;
      min-width: 0;
      max-width: 100%;
      overflow: hidden
    }

    .stats-toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 12px
    }

    .stats-filters {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap
    }

    .stats-filters select,
    .stats-filters input {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 14px;
      padding: 5px 8px
    }

    .stats-custom {
      display: none;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap
    }

    .stats-custom.active {
      display: flex
    }

    .stats-insights {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(220px, 1fr);
      gap: 12px;
      margin-bottom: 12px;
      min-width: 0;
      max-width: 100%
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      min-width: 0;
      max-width: 100%
    }

    .usage-card {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px;
      min-width: 0;
      max-width: 100%;
      overflow: hidden
    }

    .usage-card h3 {
      font-size: 15px;
      color: #f0f6fc;
      margin-bottom: 10px
    }

    .card-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      min-width: 0;
      flex-wrap: wrap
    }

    .card-title-row h3 {
      margin-bottom: 0
    }

    .card-sub {
      font-size: 12px;
      color: #8b949e;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      min-width: 0;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .time-chart {
      min-height: 210px;
      min-width: 0;
      max-width: 100%;
      overflow: hidden
    }

    .time-bars {
      height: 154px;
      display: flex;
      align-items: flex-end;
      gap: 4px;
      padding: 8px 0 6px;
      border-bottom: 1px solid #30363d;
      min-width: 0;
      max-width: 100%;
      overflow: hidden
    }

    .time-bar {
      flex: 1 1 0;
      min-width: 0;
      height: 100%;
      display: flex;
      align-items: flex-end
    }

    .time-bar-fill {
      width: 100%;
      min-height: 2px;
      background: #58a6ff;
      border: 1px solid rgba(121, 192, 255, .45);
      border-bottom: none;
      border-radius: 4px 4px 0 0
    }

    .time-axis {
      display: flex;
      gap: 4px;
      margin-top: 7px;
      color: #8b949e;
      font-size: 11px;
      min-width: 0;
      max-width: 100%;
      overflow: hidden
    }

    .time-axis span {
      flex: 1 1 0;
      min-width: 0;
      text-align: center;
      overflow: hidden;
      text-overflow: clip;
      white-space: nowrap
    }

    .time-axis .muted {
      color: transparent
    }

    .time-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
      font-size: 13px
    }

    .time-summary span {
      color: #8b949e
    }

    .time-summary b {
      display: block;
      color: #c9d1d9;
      font-size: 15px;
      font-variant-numeric: tabular-nums
    }

    .delta-list {
      display: flex;
      flex-direction: column;
      gap: 0
    }

    .delta-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: baseline;
      padding: 8px 0;
      border-bottom: 1px solid #21262d;
      min-width: 0
    }

    .delta-item.clickable {
      cursor: pointer;
      border-radius: 6px;
      padding-left: 6px;
      padding-right: 6px;
      margin-left: -6px;
      margin-right: -6px
    }

    .delta-item.clickable:hover {
      background: #161b22
    }

    .delta-item:last-child {
      border-bottom: none
    }

    .delta-label {
      color: #8b949e;
      font-size: 13px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .delta-value {
      color: #f0f6fc;
      font-size: 16px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      min-width: 0;
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .delta-sub {
      grid-column: 1/-1;
      color: #484f58;
      font-size: 12px;
      margin-top: -4px;
      min-width: 0
    }

    .delta-model {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #8b949e
    }

    .delta-up {
      color: #3fb950
    }

    .delta-down {
      color: #f85149
    }

    .delta-flat {
      color: #8b949e
    }

    .usage-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto auto;
      gap: 10px;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid #21262d;
      font-size: 14px
    }

    .usage-row:last-child {
      border-bottom: none
    }

    .usage-name {
      color: #c9d1d9;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .usage-count {
      color: #79c0ff;
      font-variant-numeric: tabular-nums
    }

    .usage-tokens {
      color: #8b949e;
      font-variant-numeric: tabular-nums
    }

    .usage-cache {
      color: #3fb950;
      font-variant-numeric: tabular-nums
    }

    .bar-list {
      display: flex;
      flex-direction: column;
      gap: 9px
    }

    .bar-row {
      font-size: 13px
    }

    .bar-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      margin-bottom: 4px
    }

    .bar-name {
      color: #c9d1d9;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .bar-main {
      color: #79c0ff;
      font-variant-numeric: tabular-nums
    }

    .bar-track {
      height: 8px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 999px;
      overflow: hidden
    }

    .bar-fill {
      height: 100%;
      background: #238636;
      border-radius: 999px
    }

    .bar-foot {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: #8b949e;
      margin-top: 3px;
      font-size: 12px
    }

    .recent-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 260px;
      overflow: auto
    }

    .recent-entry {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 14px
    }

    .recent-entry.fail {
      border-color: #7d2b2b;
      background: #1c1113
    }

    .recent-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px
    }

    .recent-model {
      color: #f0f6fc;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .recent-time {
      color: #8b949e;
      font-size: 13px;
      flex: none
    }

    .recent-meta {
      color: #8b949e;
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    .logs-panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px 18px;
      margin-top: 12px;
      min-width: 0;
      max-width: 100%;
      overflow: hidden
    }

    .logs-toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 10px
    }

    .logs-toolbar .left {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap
    }

    .logs-toolbar select,
    .logs-toolbar input {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 14px;
      padding: 5px 8px
    }

    .logs-toolbar input {
      min-width: 220px;
      max-width: 100%
    }

    .log-file {
      font-size: 13px;
      color: #8b949e;
      word-break: break-all;
      margin-bottom: 10px
    }

    .log-list {
      max-height: 520px;
      max-width: 100%;
      overflow: auto;
      border: 1px solid #30363d;
      border-radius: 8px;
      background: #0d1117
    }

    .log-table {
      width: 100%;
      min-width: 720px;
      border-collapse: collapse;
      font-size: 13px
    }

    .log-table th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #161b22;
      color: #8b949e;
      font-weight: 600;
      text-align: left;
      padding: 9px 12px;
      border-bottom: 1px solid #30363d;
      white-space: nowrap
    }

    .log-table td {
      padding: 9px 12px;
      border-bottom: 1px solid #21262d;
      vertical-align: middle;
      white-space: nowrap
    }

    .log-row {
      cursor: pointer;
      transition: background .15s
    }

    .log-row:hover {
      background: #161b22
    }

    .log-row.error {
      background: #1c1113
    }

    .log-row.error:hover {
      background: #251418
    }

    .log-row.warn {
      background: #18150c
    }

    .log-row.warn:hover {
      background: #211b0d
    }

    .log-time-cell {
      color: #c9d1d9;
      font-variant-numeric: tabular-nums
    }

    .log-model-cell {
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #f0f6fc
    }

    .log-channel-cell {
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #8b949e
    }

    .log-event-cell {
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .log-message-cell {
      max-width: 320px;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #8b949e
    }

    .log-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: #8b949e
    }

    .log-status::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #3fb950
    }

    .log-row.warn .log-status::before {
      background: #d29922
    }

    .log-row.error .log-status::before {
      background: #f85149
    }

    .log-event-pill {
      display: inline-block;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      border: 1px solid #30363d;
      border-radius: 999px;
      padding: 2px 7px;
      color: #79c0ff;
      background: #0b1520
    }

    .log-row.error .log-event-pill {
      color: #ff7b72;
      background: #1c1113;
      border-color: #7d2b2b
    }

    .log-row.warn .log-event-pill {
      color: #d29922;
      background: #18150c;
      border-color: #6b4d16
    }

    .log-num {
      color: #c9d1d9;
      text-align: right;
      font-variant-numeric: tabular-nums
    }

    .log-cache {
      color: #3fb950;
      text-align: right;
      font-variant-numeric: tabular-nums
    }

    .log-detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin: 10px 0
    }

    .log-detail-item {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 10px;
      min-width: 0
    }

    .log-detail-item span {
      display: block;
      color: #8b949e;
      font-size: 12px;
      margin-bottom: 3px
    }

    .log-detail-item b {
      display: block;
      color: #c9d1d9;
      font-weight: 500;
      word-break: break-word
    }

    .log-detail-json {
      max-height: 280px;
      overflow: auto;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 10px;
      color: #8b949e;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px
    }

    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 15px;
      z-index: 200;
      opacity: 0;
      transition: opacity .3s
    }

    .toast.show {
      opacity: 1
    }

    .toast-success {
      background: #238636;
      color: #fff
    }

    .toast-error {
      background: #da3633;
      color: #fff
    }

    .footer {
      margin-top: 28px;
      padding-top: 14px;
      border-top: 1px solid #30363d;
      font-size: 13px;
      color: #484f58;
      text-align: center
    }

    .empty {
      text-align: center;
      padding: 40px;
      color: #484f58;
      font-size: 16px
    }

    .empty .btn {
      margin-top: 12px
    }

    /* Superbapi Forwarder inspired dashboard layout */
    body {
      font-size: 14px;
      color: #e6edf3
    }

    .container {
      max-width: none;
      padding: 0
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      min-height: 74px;
      padding: 14px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d
    }

    .app-brand h1 {
      color: #e6edf3;
      font-size: 17px;
      line-height: 1.25;
      margin: 0
    }

    .app-brand .subtitle {
      font-size: 12px;
      margin: 3px 0 0
    }

    .header-connection {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
      color: #8b949e;
      font-size: 12px
    }

    .header-connection-item {
      min-width: 0
    }

    .header-connection-item span {
      display: block;
      margin-bottom: 2px
    }

    .header-connection code {
      display: block;
      max-width: 350px;
      overflow: hidden;
      color: #79c0ff;
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(6, minmax(110px, 1fr));
      gap: 8px;
      margin: 0;
      padding: 12px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d
    }

    .stat {
      min-width: 0;
      padding: 10px;
      background: #21262d;
      border: 0;
      border-radius: 8px;
      text-align: center
    }

    .stat .num {
      color: #79c0ff;
      font-size: 22px;
      line-height: 1.15
    }

    .stat .label {
      font-size: 11px
    }

    .stat .sub {
      font-size: 10px
    }

    .tabs {
      gap: 0;
      margin: 0;
      padding: 0 8px;
      background: #161b22
    }

    .tab-btn {
      padding: 11px 14px;
      color: #8b949e;
      font-size: 14px;
      font-weight: 500
    }

    .tab-btn:hover {
      color: #e6edf3;
      background: transparent
    }

    .tab-btn.active {
      color: #e6edf3;
      border-bottom-color: #2d6eea
    }

    .tab-panel {
      min-height: calc(100vh - 220px)
    }

    .tab-panel:not(#tab-channels) {
      padding: 14px 16px
    }

    .channel-page-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d
    }

    .channel-page-head .section-title {
      margin: 0;
      font-size: 14px
    }

    .global-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap
    }

    .channel-filter {
      display: none
    }

    .channel-subtabs {
      gap: 0;
      margin: 0;
      padding: 0 8px;
      overflow-x: auto;
      background: #0d1117;
      border-bottom: 1px solid #30363d
    }

    .channel-tab {
      min-height: 42px;
      padding: 10px 14px;
      background: transparent;
      border: 0;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      color: #8b949e;
      font-size: 13px;
      font-weight: 500
    }

    .channel-tab:hover {
      color: #e6edf3;
      background: transparent
    }

    .channel-tab.active {
      color: #e6edf3;
      background: transparent;
      border-color: #2d6eea
    }

    .channel-tab.ch-disabled {
      opacity: 1;
      color: #f85149
    }

    .channel-tab-count {
      padding: 1px 6px;
      border-radius: 10px;
      background: #21262d;
      color: #8b949e;
      font-size: 10px
    }

    #channels {
      min-height: 220px
    }

    .channel-dashboard {
      min-width: 0
    }

    .channel-overview {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d
    }

    .channel-overview-main {
      min-width: 0
    }

    .channel-overview-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex-wrap: wrap
    }

    .channel-overview-title strong {
      color: #e6edf3;
      font-size: 15px
    }

    .channel-overview-meta {
      display: flex;
      gap: 10px;
      margin-top: 3px;
      color: #8b949e;
      font-size: 11px;
      flex-wrap: wrap
    }

    .status-pill {
      display: inline-flex;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap
    }

    .status-pill.on {
      color: #3fb950;
      background: #1a4a1a
    }

    .status-pill.off {
      color: #f85149;
      background: #3a1010
    }

    .channel-key-stats {
      display: grid;
      grid-template-columns: repeat(6, minmax(90px, 1fr));
      gap: 8px;
      padding: 12px 16px;
      background: #0d1117;
      border-bottom: 1px solid #30363d
    }

    .channel-key-stat {
      padding: 10px;
      background: #21262d;
      border-radius: 8px;
      text-align: center
    }

    .channel-key-stat b {
      display: block;
      color: #79c0ff;
      font-size: 21px
    }

    .channel-key-stat b.ok {
      color: #3fb950
    }

    .channel-key-stat b.bad {
      color: #f85149
    }

    .channel-key-stat span {
      color: #8b949e;
      font-size: 11px
    }

    .channel-view-tabs {
      display: flex;
      gap: 0;
      padding: 0 8px;
      background: #161b22;
      border-bottom: 1px solid #30363d
    }

    .channel-view-tab {
      padding: 10px 14px;
      background: none;
      border: 0;
      border-bottom: 2px solid transparent;
      border-radius: 0;
      color: #8b949e;
      font-size: 13px
    }

    .channel-view-tab.active {
      color: #e6edf3;
      border-bottom-color: #2d6eea
    }

    .key-toolbar,
    .model-toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      overflow-x: auto;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-wrap: wrap
    }

    .key-toolbar .btn,
    .model-toolbar .btn,
    .key-card .btn {
      padding: 6px 10px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 12px
    }

    .key-toolbar .btn-primary,
    .model-toolbar .btn-primary {
      background: #238636;
      border-color: #2ea043
    }

    .key-toolbar .btn-danger,
    .key-card .btn-danger {
      background: #b91c1c;
      border-color: #dc2626
    }

    .toolbar-divider {
      width: 1px;
      height: 24px;
      margin: 0 3px;
      background: #30363d
    }

    .selection-count {
      color: #8b949e;
      font-size: 12px;
      white-space: nowrap
    }

    .key-filter-bar,
    .model-filter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: #0d1117;
      border-bottom: 1px solid #21262d
    }

    .key-filter-bar input[type="text"],
    .model-filter-bar input[type="text"] {
      flex: 1;
      min-width: 160px;
      padding: 7px 10px;
      outline: none;
      color: #e6edf3;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      font-size: 13px
    }

    .key-filter-bar label {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #8b949e;
      font-size: 12px;
      white-space: nowrap
    }

    .key-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px 16px 16px
    }

    .key-card {
      padding: 12px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px
    }

    .key-card.disabled {
      background: #1a0e0e;
      border-color: #f8514940
    }

    .key-card-top {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0
    }

    .key-select {
      width: 16px;
      height: 16px;
      flex: none;
      accent-color: #2d6eea
    }

    .key-value {
      min-width: 0;
      flex: 1;
      overflow: hidden;
      color: #79c0ff;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
      user-select: all
    }

    .key-meta-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(100px, 1fr));
      gap: 5px 14px;
      margin: 9px 0;
      color: #8b949e;
      font-size: 11px
    }

    .key-meta-grid b {
      color: #e6edf3;
      font-weight: 500
    }

    .key-reason {
      grid-column: 1 / -1;
      color: #f85149;
      overflow-wrap: anywhere
    }

    .key-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap
    }

    .model-panel {
      padding-bottom: 16px
    }

    .model-list-dashboard {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 12px 16px
    }

    .model-list-dashboard .model-tag {
      padding: 5px 10px;
      border-radius: 6px
    }

    .batch-progress {
      height: 7px;
      margin: 10px 0;
      overflow: hidden;
      background: #21262d;
      border-radius: 6px
    }

    .batch-progress-bar {
      height: 100%;
      width: 0;
      background: #238636;
      transition: width .2s
    }

    .batch-result-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 330px;
      overflow-y: auto
    }

    .batch-result-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      background: #21262d;
      font-size: 12px
    }

    .batch-result-row.pass {
      background: #1a4a1a
    }

    .batch-result-row.fail {
      background: #3a1010
    }

    .footer {
      margin: 0;
      padding: 14px 16px
    }

    @media (max-width: 720px) {
      .container {
        padding: 0
      }

      .app-header {
        align-items: flex-start;
        flex-direction: column
      }

      .header-connection {
        width: 100%;
        align-items: flex-start;
        flex-direction: column;
        gap: 6px
      }

      .stats,
      .channel-key-stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        padding: 10px
      }

      .channel-overview {
        align-items: flex-start;
        flex-direction: column
      }

      .key-list,
      .key-toolbar,
      .model-toolbar,
      .key-filter-bar,
      .model-filter-bar {
        padding-left: 10px;
        padding-right: 10px
      }

      .key-meta-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr))
      }

      .endpoint,
      .channel {
        padding: 12px
      }

      .channel-header {
        flex-direction: column;
        align-items: stretch
      }

      .channel-actions {
        justify-content: flex-start
      }

      .stats-panel,
      .logs-panel {
        padding: 12px 10px
      }

      .stats-insights {
        grid-template-columns: minmax(0, 1fr)
      }

      .stats-grid {
        grid-template-columns: minmax(0, 1fr)
      }

      .time-summary {
        grid-template-columns: 1fr
      }

      .time-bars,
      .time-axis {
        gap: 3px
      }

      .log-table {
        min-width: 680px
      }

      .log-detail-grid {
        grid-template-columns: 1fr
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <header class="app-header">
      <div class="app-brand">
        <h1>API Gateway 面板</h1>
        <div class="subtitle">多渠道 · 多 Key 轮询 · 坏 Key 自动禁用并记录原因</div>
      </div>
      <div class="header-connection">
        <div class="header-connection-item"><span>API 地址</span><code id="apiUrl"></code></div>
        <div class="header-connection-item"><span>管理 Key</span><code id="apiKeyLabel">未设置</code></div>
      </div>
    </header>

    <div class="stats" id="stats"></div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="channels" onclick="switchTab('channels')">📦 渠道</button>
      <button class="tab-btn" data-tab="logs" onclick="switchTab('logs')">🧾 日志</button>
      <button class="tab-btn" data-tab="stats" onclick="switchTab('stats')">📊 统计</button>
    </div>

    <div class="tab-panel active" id="tab-channels">
      <div class="channel-page-head">
        <div class="section-title">📦 渠道 <span class="badge" id="chCount"></span></div>
        <div class="global-actions">
          <button class="btn btn-primary btn-sm" onclick="showAddChannel()">+ 添加渠道</button>
          <button class="btn btn-outline btn-sm" onclick="exportBackup()">导出备份</button>
          <button class="btn btn-outline btn-sm" onclick="importBackup()">导入备份</button>
          <button class="btn btn-primary btn-sm" onclick="showClientKeysModal()">🔐 调用 Key</button>
          <button class="btn btn-outline btn-sm" onclick="showApiKeyModal()">修改管理 Key</button>
        </div>
      </div>
      <div class="channel-filter" id="channelFilter"></div>
      <div class="channel-subtabs" id="channelTabs"></div>
      <div id="channels"></div>
    </div>

    <div class="tab-panel" id="tab-logs">
      <div class="section-title">🧾 日志 <span class="badge" id="logCount">0</span></div>
      <div class="logs-panel">
        <div class="logs-toolbar">
          <div class="left">
            <button class="btn btn-outline btn-sm" onclick="loadLogs()">刷新</button>
            <button class="btn btn-danger btn-sm" onclick="clearLogs()">清空日志</button>
            <select id="logEventFilter" onchange="renderLogs()">
              <option value="">全部事件</option>
            </select>
            <input id="logSearch" placeholder="搜索模型 / 渠道 / 错误 / requestId" oninput="renderLogs()">
            <select id="logLimit" onchange="loadLogs()">
              <option value="50">最近 50 条</option>
              <option value="100" selected>最近 100 条</option>
              <option value="200">最近 200 条</option>
              <option value="500">最近 500 条</option>
            </select>
          </div>
          <span class="channel-info">请求链路 / 路由 / 上游错误</span>
        </div>
        <div class="log-file" id="logFile">未加载</div>
        <div class="log-list" id="logs">
          <div class="empty">暂无日志</div>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="tab-stats">
      <div class="section-title">📊 统计 <span class="badge" id="statsUpdated">未加载</span></div>
      <div class="stats-panel">
        <div class="stats-toolbar">
          <div class="stats-filters">
            <select id="statsRange" onchange="renderStatsForRange()">
              <option value="all">全部时间</option>
              <option value="today">今天</option>
              <option value="7d">最近 7 天</option>
              <option value="30d">最近 30 天</option>
              <option value="custom">自定义</option>
            </select>
            <select id="statsMetric" onchange="renderStatsForRange()">
              <option value="requests">按请求次数</option>
              <option value="tokens">按 Token</option>
            </select>
            <div class="stats-custom" id="statsCustomRange">
              <input type="date" id="statsStart" onchange="renderStatsForRange()">
              <span class="channel-info">到</span>
              <input type="date" id="statsEnd" onchange="renderStatsForRange()">
            </div>
            <span class="channel-info" id="statsRangeLabel">全部时间</span>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-outline btn-sm" onclick="loadStats()">刷新</button>
            <button class="btn btn-danger btn-sm" onclick="resetStats()">重置统计</button>
          </div>
        </div>
        <div class="stats-insights">
          <div class="usage-card">
            <div class="card-title-row">
              <h3>按时间统计</h3>
              <span class="card-sub" id="timeStatsSummary">暂无统计</span>
            </div>
            <div class="time-chart" id="timeUsageChart">
              <div class="empty">暂无统计</div>
            </div>
          </div>
          <div class="usage-card">
            <h3>最近增量</h3>
            <div id="recentDelta">
              <div class="empty">暂无统计</div>
            </div>
          </div>
        </div>
        <div class="stats-grid">
          <div class="usage-card">
            <h3>热门模型</h3>
            <div id="modelUsage">
              <div class="empty">暂无统计</div>
            </div>
          </div>
          <div class="usage-card">
            <h3>热门渠道</h3>
            <div id="channelUsage">
              <div class="empty">暂无统计</div>
            </div>
          </div>
          <div class="usage-card">
            <h3>热门 IP</h3>
            <div id="ipUsage">
              <div class="empty">暂无统计</div>
            </div>
          </div>
          <div class="usage-card">
            <h3>最近请求</h3>
            <div class="recent-list" id="recentUsage">
              <div class="empty">暂无请求</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">聚合渠道 · 小咲出品 💕</div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal" id="modalContent"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const KEY_STORAGE = 'apiGatewayKey';
    let KEY = localStorage.getItem(KEY_STORAGE) || '';
    function isSafeHeaderValue(value = '') {
      return /^[\x21-\x7E]+$/.test(String(value));
    }

    function promptForAdminKey(message = '聚合渠道管理 Key（初始默认 123456）') {
      const nextKey = prompt(message) || '';
      KEY = nextKey.trim();
      if (KEY && !isSafeHeaderValue(KEY)) {
        KEY = '';
        localStorage.removeItem(KEY_STORAGE);
        alert('管理 Key 只能包含英文、数字和常见英文符号，请不要粘贴中文、空格或 emoji。');
      } else if (KEY) {
        localStorage.setItem(KEY_STORAGE, KEY);
      }
      document.getElementById('apiKeyLabel').textContent = KEY ? '已保存在本浏览器' : '未设置';
      return KEY;
    }
    if (!KEY) promptForAdminKey();
    const HOST = location.hostname || '170.106.64.129';
    function getApiDisplayUrl() {
      if (location.protocol === 'https:') return `${location.origin}/v1`;
      const port = location.port || '8300';
      return `http://${HOST}:${port}/v1`;
    }
    document.getElementById('apiUrl').textContent = getApiDisplayUrl();
    document.getElementById('apiKeyLabel').textContent = KEY ? '已保存在本浏览器' : '未设置';

    let channels = {};
    let editingKey = null;
    let gatewayLogs = [];
    let renderedLogs = [];
    let logFile = '';
    let gatewayStats = null;
    let clientKeys = [];
    let channelFilter = 'all';
    let activeChannelTab = '';
    let channelModelSearch = '';
    let channelView = 'keys';
    let channelKeyDashboard = null;
    let channelKeySearch = '';
    let channelOnlyDisabledKeys = false;
    let selectedChannelKeys = new Set();
    let channelKeysLoading = false;
    let channelKeysRequestSeq = 0;
    let channelBatchRunning = false;
    let probedUpstreamModels = [];
    let selectedProbedModels = new Set();
    let statsView = { label: '全部时间', totalRequests: 0, totalTokens: 0, cacheHitCount: 0, cacheReadInputTokens: 0, cacheCreationInputTokens: 0, modelUsage: {}, channelUsage: {}, ipUsage: {}, recentLogs: [], timeSeries: [], recentDelta: null };
    const HIDDEN_LOG_EVENTS = new Set(['http_request', 'model_params', 'model_routed']);

    function toast(msg, ok = true) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `toast toast-${ok ? 'success' : 'error'} show`;
      setTimeout(() => el.classList.remove('show'), 2000);
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function jsArg(value) {
      return escapeHtml(JSON.stringify(String(value ?? '')));
    }

    function escapeRegExp(value = '') {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function stripOwnModelPrefix(model = '', prefix = '') {
      const value = String(model || '');
      const ownPrefix = String(prefix || '').trim();
      if (!ownPrefix) return value;
      const escapedPrefix = escapeRegExp(ownPrefix);
      return value
        .replace(new RegExp(`^\\[${escapedPrefix}\\]`), '')
        .replace(new RegExp(`^${escapedPrefix}/`, 'i'), '');
    }

    function getCurrentModelPrefix() {
      const input = document.getElementById('chPrefix');
      return input ? input.value.trim() : (editingKey || '');
    }

    function applyModelPrefix(models = [], prefix = '') {
      const ownPrefix = String(prefix || '').trim();
      if (!ownPrefix) return models;
      return models.map(model => {
        const bare = stripOwnModelPrefix(model, ownPrefix);
        return `[${ownPrefix}]${bare}`;
      });
    }

    function normalizeModelsForPrefix(models = [], nextPrefix = '', previousPrefix = '') {
      const cleaned = models.map(model => stripOwnModelPrefix(stripOwnModelPrefix(model, previousPrefix), nextPrefix));
      return applyModelPrefix(cleaned, nextPrefix);
    }

    function getChannelModelPrefix(ckey, ch = {}) {
      if (Object.prototype.hasOwnProperty.call(ch, 'model_prefix')) {
        return String(ch.model_prefix || '').trim();
      }
      return String(ckey || '').trim();
    }

    function makeChannelKey(name = '', baseUrl = '') {
      let key = String(name || '').toLowerCase().replace(/[^a-z0-9]/g, '');
      if (!key) {
        try {
          key = new URL(baseUrl).hostname.split('.').filter(Boolean)[0]?.replace(/[^a-z0-9]/gi, '').toLowerCase() || '';
        } catch (_) { }
      }
      if (!key) key = `ch${Date.now().toString(36)}`;
      let candidate = key;
      let suffix = 2;
      while (channels[candidate]) {
        candidate = `${key}${suffix++}`;
      }
      return candidate;
    }

    function showApiKeyModal() {
      document.getElementById('modalContent').innerHTML = `
    <h3>修改管理 Key</h3>
    <label>新的管理 Key</label>
    <input id="newApiKey" type="password" placeholder="至少 4 位" autocomplete="new-password">
    <div class="hint">保存后会写入 config.json，并自动更新当前浏览器保存的 Key</div>
    <div class="actions">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveApiKey()">保存</button>
    </div>`;
      document.getElementById('modal').classList.add('active');
      setTimeout(() => document.getElementById('newApiKey')?.focus(), 0);
    }

    async function saveApiKey() {
      const nextKey = document.getElementById('newApiKey').value.trim();
      if (nextKey.length < 4) { toast('管理 Key 至少 4 位', false); return; }
      try {
        const res = await api('/api/config/api-key', {
          method: 'POST',
          body: JSON.stringify({ api_key: nextKey })
        });
        if (res.ok) {
          KEY = nextKey;
          localStorage.setItem(KEY_STORAGE, KEY);
          document.getElementById('apiKeyLabel').textContent = '已保存在本浏览器';
          toast('管理 Key 已修改');
          closeModal();
        } else {
          toast(res.error || '修改失败', false);
        }
      } catch (e) {
        toast('修改失败: ' + e.message, false);
      }
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tab);
      });
      document.querySelectorAll('.tab-panel').forEach(panel => {
        panel.classList.toggle('active', panel.id === `tab-${tab}`);
      });
    }

    async function api(path, opts = {}) {
      KEY = String(KEY || '').trim();
      if (KEY && !isSafeHeaderValue(KEY)) {
        localStorage.removeItem(KEY_STORAGE);
        const err = new Error('管理 Key 包含非法字符，请重新输入');
        err.status = 401;
        throw err;
      }
      if (KEY) localStorage.setItem(KEY_STORAGE, KEY);
      const res = await fetch(path, { headers: { 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json' }, ...opts });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const err = new Error(data.error?.message || data.error || `HTTP ${res.status}`);
        err.status = res.status;
        throw err;
      }
      return data;
    }

    async function exportBackup() {
      if (!confirm('备份会包含所有渠道 Key 和管理 Key，确定导出？')) return;
      try {
        const res = await fetch('/api/config/export', {
          headers: { 'Authorization': `Bearer ${KEY}` },
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error?.message || `HTTP ${res.status}`);
        }
        const blob = await res.blob();
        const disposition = res.headers.get('content-disposition') || '';
        const match = disposition.match(/filename="?([^"]+)"?/i);
        const fallback = `api-gateway-backup-${new Date().toISOString().replace(/[:.]/g, '-')}.json`;
        const filename = match?.[1] || fallback;
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        toast('备份已导出');
      } catch (e) {
        toast('导出失败: ' + e.message, false);
      }
    }

    async function importBackup() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'application/json,.json';
      input.onchange = async () => {
        const file = input.files?.[0];
        if (!file) return;
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          const importedConfig = data?.config && typeof data.config === 'object' ? data.config : data;
          const channelCount = Object.keys(importedConfig?.channels || {}).length;
          const modelCount = Array.isArray(importedConfig?.models) ? importedConfig.models.length : 0;
          if (!importedConfig?.channels || typeof importedConfig.channels !== 'object' || Array.isArray(importedConfig.channels)) {
            throw new Error('备份文件缺少 channels');
          }
          const warning = `确定导入这个备份？\n\n渠道: ${channelCount}\n模型: ${modelCount}\n\n导入会覆盖当前配置，包含管理 Key 和所有渠道 Key。`;
          if (!confirm(warning)) return;
          const res = await api('/api/config/import', {
            method: 'POST',
            body: JSON.stringify(data)
          });
          if (importedConfig.api_key) {
            KEY = String(importedConfig.api_key);
            localStorage.setItem(KEY_STORAGE, KEY);
            document.getElementById('apiKeyLabel').textContent = '已保存在本浏览器';
          }
          toast(`备份已导入：${res.channels} 个渠道`);
          await load();
        } catch (e) {
          toast('导入失败: ' + e.message, false);
        }
      };
      input.click();
    }

    async function load() {
      try {
        const d = await api('/api/config');
        channels = d.channels || {};
        clientKeys = d.api_keys || [];
      } catch (e) {
        if (e.status === 401) {
          localStorage.removeItem(KEY_STORAGE);
          document.getElementById('apiKeyLabel').textContent = 'Key 错误';
          if (promptForAdminKey('管理 Key 不正确，请重新输入')) {
            return load();
          }
          document.getElementById('stats').innerHTML = `
        <div class="stat"><div class="num" style="color:#f85149">!</div><div class="label">认证失败</div></div>
      `;
          document.getElementById('chCount').textContent = '认证失败';
          document.getElementById('channels').innerHTML = '<div class="empty">管理 Key 不正确<br><button class="btn btn-primary" onclick="promptForAdminKey() && load()" style="margin-top:12px">重新输入 Key</button></div>';
          toast('管理 Key 不正确，已清除本地保存值', false);
          return;
        }
        toast(`加载配置失败: ${e.message || '未知错误'}`, false);
        return;
      }
      render();
      if (activeChannelTab && channelView === 'keys') {
        channelKeyDashboard = null;
        void loadActiveChannelKeys({ silent: true });
      }
      loadStats();
      loadLogs();
    }

    async function loadStats() {
      try {
        gatewayStats = await api('/api/stats');
        renderStatsForRange();
      } catch (e) {
        document.getElementById('statsUpdated').textContent = '加载失败';
        toast('统计加载失败: ' + e.message, false);
      }
    }

    async function resetStats() {
      if (!confirm('确定清空所有请求统计？')) return;
      try {
        await api('/api/stats/reset', { method: 'POST', body: '{}' });
        toast('统计已重置');
        await loadStats();
      } catch (e) {
        toast('重置失败: ' + e.message, false);
      }
    }

    async function loadLogs() {
      try {
        const limit = document.getElementById('logLimit')?.value || '100';
        const d = await api(`/api/logs?limit=${limit}`);
        gatewayLogs = d.logs || [];
        logFile = d.file || '';
        renderLogFilter();
        renderLogs();
      } catch (e) {
        document.getElementById('logs').innerHTML = '<div class="empty">日志加载失败</div>';
        toast('日志加载失败: ' + e.message, false);
      }
    }

    async function clearLogs() {
      if (!confirm('确定清空今天的聚合渠道日志？这个操作不会清空统计数据。')) return;
      try {
        const d = await api('/api/logs/clear', { method: 'POST', body: '{}' });
        gatewayLogs = [];
        logFile = d.file || logFile;
        renderLogFilter();
        renderLogs();
        toast('日志已清空');
      } catch (e) {
        toast('清空日志失败: ' + e.message, false);
      }
    }

    function renderLogFilter() {
      const select = document.getElementById('logEventFilter');
      const current = select.value;
      const events = [...new Set(gatewayLogs.map(l => l.event).filter(Boolean))]
        .filter(event => !HIDDEN_LOG_EVENTS.has(event))
        .sort();
      select.innerHTML = '<option value="">全部事件</option>' + events.map(e => `<option value="${escapeHtml(e)}">${escapeHtml(e)}</option>`).join('');
      if (events.includes(current)) select.value = current;
    }

    function logClass(entry) {
      const event = entry.event || '';
      if (Number(entry.statusCode) >= 400) return 'error';
      if (event.includes('error') || event.includes('not_found') || event.includes('rejected') || event.includes('invalid')) return 'error';
      if (event.includes('filtered') || event.includes('timeout') || event.includes('partial')) return 'warn';
      return '';
    }

    function formatLogTime(ts) {
      if (!ts) return '';
      try {
        return new Date(ts).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false });
      } catch {
        return ts;
      }
    }

    function getLogModel(entry = {}) {
      return entry.model || entry.requestedModel || entry.upstreamModel || entry.realModel || '-';
    }

    function getLogChannel(entry = {}) {
      return entry.channel || entry.channelKey || '-';
    }

    function getLogStatusLabel(entry = {}) {
      const status = entry.statusCode != null ? String(entry.statusCode) : '';
      if (logClass(entry) === 'error') return status || '失败';
      if (logClass(entry) === 'warn') return status || '警告';
      return status || '成功';
    }

    function getLogSummary(entry = {}) {
      const fields = [
        entry.errorMessage,
        entry.error,
        entry.responseBody,
        entry.outputContent,
        entry.upstreamHost && entry.upstreamPath ? `${entry.upstreamHost}${entry.upstreamPath}` : '',
        entry.url,
      ];
      const summary = fields.find(value => value != null && String(value).trim());
      return summary ? String(summary).replace(/\s+/g, ' ').slice(0, 260) : '-';
    }

    function logMatchesSearch(entry = {}, query = '') {
      const q = query.trim().toLowerCase();
      if (!q) return true;
      const haystack = [
        entry.event,
        entry.requestId,
        getLogModel(entry),
        getLogChannel(entry),
        getLogStatusLabel(entry),
        getLogSummary(entry),
      ].join(' ').toLowerCase();
      return haystack.includes(q);
    }

    function getLogInputTokens(entry = {}) {
      return Number(entry.inputTokens ?? entry.promptTokens ?? entry.input_tokens) || 0;
    }

    function getLogOutputTokens(entry = {}) {
      return Number(entry.outputTokens ?? entry.completionTokens ?? entry.output_tokens) || 0;
    }

    function getLogTokenTotal(entry = {}) {
      const explicit = entry.totalTokens ?? entry.tokens;
      if (explicit != null) return Number(explicit) || 0;
      return getLogInputTokens(entry) + getLogOutputTokens(entry);
    }

    function getLogCacheTotal(entry = {}) {
      return (Number(entry.cacheReadInputTokens) || 0) + (Number(entry.cacheCreationInputTokens) || 0);
    }

    function formatLogMetric(value, suffix = '') {
      const number = Number(value) || 0;
      if (!number) return '-';
      return `${formatNumber(number)}${suffix}`;
    }

    function renderLogs() {
      const filter = document.getElementById('logEventFilter').value;
      const search = document.getElementById('logSearch')?.value || '';
      const visibleLogs = gatewayLogs.filter(l => !HIDDEN_LOG_EVENTS.has(l.event));
      renderedLogs = visibleLogs
        .filter(l => !filter || l.event === filter)
        .filter(l => logMatchesSearch(l, search));
      document.getElementById('logCount').textContent = renderedLogs.length;
      document.getElementById('logFile').textContent = logFile || '未加载';
      if (!renderedLogs.length) {
        document.getElementById('logs').innerHTML = '<div class="empty">没有匹配日志</div>';
        return;
      }
      document.getElementById('logs').innerHTML = `
    <table class="log-table">
      <thead>
        <tr>
          <th>时间</th>
          <th>事件</th>
          <th>模型</th>
          <th style="text-align:right">输入</th>
          <th style="text-align:right">输出</th>
          <th>状态</th>
          <th>渠道</th>
          <th>摘要</th>
        </tr>
      </thead>
      <tbody>
        ${renderedLogs.map((entry, index) => {
        const rowClass = logClass(entry);
        const model = getLogModel(entry);
        const channel = getLogChannel(entry);
        const inputTokens = getLogInputTokens(entry);
        const outputTokens = getLogOutputTokens(entry);
        const totalTokens = getLogTokenTotal(entry);
        const outputDisplay = outputTokens || (!inputTokens ? totalTokens : 0);
        const summary = getLogSummary(entry);
        return `
            <tr class="log-row ${rowClass}" onclick="showLogDetail(${index})" title="点击查看详情">
              <td class="log-time-cell">${escapeHtml(formatLogTime(entry.timestamp))}</td>
              <td class="log-event-cell"><span class="log-event-pill" title="${escapeHtml(entry.event || '-')}">${escapeHtml(entry.event || '-')}</span></td>
              <td class="log-model-cell" title="${escapeHtml(model)}">${escapeHtml(model)}</td>
              <td class="log-num">${formatLogMetric(inputTokens)}</td>
              <td class="log-num">${formatLogMetric(outputDisplay)}</td>
              <td><span class="log-status">${escapeHtml(getLogStatusLabel(entry))}</span></td>
              <td class="log-channel-cell" title="${escapeHtml(channel)}">${escapeHtml(channel)}</td>
              <td class="log-message-cell" title="${escapeHtml(summary)}">${escapeHtml(summary)}</td>
            </tr>
          `;
      }).join('')}
      </tbody>
    </table>
  `;
    }

    function makeLogDetailItem(label, value) {
      const shown = value == null || value === '' ? '-' : value;
      return `<div class="log-detail-item"><span>${escapeHtml(label)}</span><b>${escapeHtml(shown)}</b></div>`;
    }

    function showLogDetail(index) {
      const entry = renderedLogs[index];
      if (!entry) return;
      const model = getLogModel(entry);
      const channel = getLogChannel(entry);
      const rawText = JSON.stringify(entry, null, 2);
      const errorText = entry.errorMessage || entry.error || '';
      document.getElementById('modalContent').innerHTML = `
    <h3>日志详情</h3>
    <div class="log-detail-grid">
      ${makeLogDetailItem('时间', formatLogTime(entry.timestamp))}
      ${makeLogDetailItem('事件', entry.event || '-')}
      ${makeLogDetailItem('模型', model)}
      ${makeLogDetailItem('请求模型', entry.requestedModel || '-')}
      ${makeLogDetailItem('渠道', channel)}
      ${makeLogDetailItem('状态', getLogStatusLabel(entry))}
      ${makeLogDetailItem('请求 ID', entry.requestId || '-')}
      ${makeLogDetailItem('客户端', entry.clientIp || entry.client || '-')}
      ${makeLogDetailItem('耗时', entry.durationMs != null ? `${entry.durationMs} ms` : '-')}
      ${makeLogDetailItem('输入 Token', getLogInputTokens(entry) ? `${formatNumber(getLogInputTokens(entry))} tok` : '-')}
      ${makeLogDetailItem('输出 Token', getLogOutputTokens(entry) ? `${formatNumber(getLogOutputTokens(entry))} tok` : '-')}
      ${makeLogDetailItem('总 Token', getLogTokenTotal(entry) ? `${formatNumber(getLogTokenTotal(entry))} tok` : '-')}
      ${errorText ? makeLogDetailItem('错误', errorText) : ''}
    </div>
    <div class="card-title-row" style="margin-top:12px">
      <h3 style="font-size:15px;margin:0">原始日志</h3>
      <button class="btn btn-outline btn-sm" onclick="copyText(${jsArg(rawText)})">复制 JSON</button>
    </div>
    <div class="log-detail-json">${escapeHtml(rawText)}</div>
    <div class="actions" style="display:flex;justify-content:flex-end;margin-top:12px">
      <button class="btn btn-outline" onclick="closeModal()">关闭</button>
    </div>
  `;
      document.getElementById('modal').classList.add('active');
    }

    async function copyText(value) {
      try {
        await navigator.clipboard.writeText(value);
        toast('已复制');
        return;
      } catch { }

      const textarea = document.createElement('textarea');
      textarea.value = value;
      textarea.setAttribute('readonly', '');
      textarea.style.position = 'fixed';
      textarea.style.left = '-9999px';
      textarea.style.top = '0';
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();
      textarea.setSelectionRange(0, textarea.value.length);
      try {
        const ok = document.execCommand('copy');
        toast(ok ? '已复制' : '复制失败，请手动复制', ok);
      } catch {
        toast('复制失败，请手动复制', false);
      } finally {
        document.body.removeChild(textarea);
      }
    }

    function showClientKeysModal() {
      const rows = clientKeys.length ? clientKeys.map(raw => {
        const item = normalizeClientKey(raw);
        const allowed = item.allowed_channels?.length
          ? item.allowed_channels.map(key => channels[key]?.name || key).join(', ')
          : '全部渠道';
        const allowedModels = item.allowed_models?.length
          ? item.allowed_models.join(', ')
          : '全部模型';
        const quotaText = item.quota_limit > 0
          ? `${item.quota_used || 0}/${item.quota_limit}`
          : '不限';
        const expiresText = formatClientKeyExpiry(item.expires_at);
        const expired = isClientKeyExpired(item);
        return `
    <div style="background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:9px 10px;margin:8px 0">
      <div style="display:flex;gap:8px;align-items:center">
        <div style="flex:1;min-width:0">
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
            <strong style="color:#f0f6fc">${escapeHtml(item.name || '未命名 Key')}</strong>
            ${item.enabled === false ? '<span style="color:#f85149;font-size:12px">已禁用</span>' : ''}
            ${expired ? '<span style="color:#f85149;font-size:12px">已到期</span>' : ''}
          </div>
          <code style="display:block;word-break:break-all;color:#79c0ff;margin-top:4px">${escapeHtml(item.key)}</code>
          <div class="hint">可用渠道：${escapeHtml(allowed)}</div>
          <div class="hint">可用模型：${escapeHtml(allowedModels)}</div>
          <div class="hint">使用次数：${formatNumber(item.usage_count)} · 错误 ${formatNumber(item.usage_errors)} · Token ${formatNumber(item.usage_input_tokens + item.usage_output_tokens)}</div>
          <div class="hint">额度：${escapeHtml(quotaText)} · 每次请求扣 1</div>
          <div class="hint">截止时间：${escapeHtml(expiresText)}</div>
        </div>
        <button class="btn btn-outline btn-sm" onclick="copyText(${jsArg(item.key)})">复制</button>
        ${item.key_type === 'admin' ? '<span class="hint">管理 Key</span>' : `<button class="btn btn-outline btn-sm" onclick="editClientKey(${jsArg(item.key)})">编辑</button>
        <button class="btn btn-danger btn-sm" onclick="deleteClientKey(${jsArg(item.key)})">删除</button>`}
      </div>
    </div>
  `}).join('') : '<div class="empty" style="padding:18px">还没有调用 Key</div>';
      document.getElementById('modalContent').innerHTML = `
    <h3>调用 Key</h3>
    <div class="hint">调用 Key 给别人接入 /v1 使用；不同 Key 可限制不同渠道，/v1/models 只显示它能用的模型。</div>
    <label>批量生成数量</label>
    <input id="clientKeyCount" type="number" min="1" max="100" value="10">
    <label>前缀</label>
    <input id="clientKeyPrefix" value="key" placeholder="例如 user">
    <label>总额度</label>
    <input id="clientKeyQuotaLimit" type="number" min="0" step="1" value="0">
    <div class="hint">0 = 不限额度。所有模型每次请求扣 1。</div>
    <label>截止时间</label>
    <input id="clientKeyExpiresAt" type="datetime-local">
    <div class="hint">留空 = 永久有效。到期后这个 Key 不能调用 /v1。</div>
    ${renderClientKeyChannelPicker('newClientKeyChannels', [])}
    ${renderClientKeyModelPicker('newClientKeyModels', [])}
    <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="generateClientKeys()">批量生成</button>
      <button class="btn btn-outline" onclick="showManualClientKeyModal()">手动添加</button>
      <button class="btn btn-outline" onclick="copyText(clientKeys.map(k => normalizeClientKey(k).key).join('\\n'))">复制全部</button>
    </div>
    <div style="margin-top:14px">${rows}</div>
    <div class="actions">
      <button class="btn btn-outline" onclick="closeModal()">关闭</button>
    </div>`;
      document.getElementById('modal').classList.add('active');
    }

    function normalizeClientKey(raw) {
      if (typeof raw === 'string') {
        return { key: raw, name: '', allowed_channels: [], allowed_models: [], quota_limit: 0, quota_used: 0, expires_at: '', enabled: true };
      }
      return {
        key: String(raw?.key || ''),
        name: String(raw?.name || ''),
        allowed_channels: Array.isArray(raw?.allowed_channels) ? raw.allowed_channels : [],
        allowed_models: Array.isArray(raw?.allowed_models) ? raw.allowed_models : [],
        quota_limit: Math.max(0, Math.floor(Number(raw?.quota_limit) || 0)),
        quota_used: Math.max(0, Math.floor(Number(raw?.quota_used) || 0)),
        expires_at: String(raw?.expires_at || ''),
        enabled: raw?.enabled !== false,
        key_type: String(raw?.key_type || 'generated'),
        usage_count: Math.max(0, Number(raw?.usage_count) || 0),
        usage_errors: Math.max(0, Number(raw?.usage_errors) || 0),
        usage_input_tokens: Math.max(0, Number(raw?.usage_input_tokens) || 0),
        usage_output_tokens: Math.max(0, Number(raw?.usage_output_tokens) || 0),
        last_used_at: String(raw?.last_used_at || ''),
      };
    }

    function isClientKeyExpired(item = {}) {
      if (!item.expires_at) return false;
      const time = Date.parse(item.expires_at);
      return Number.isFinite(time) && time <= Date.now();
    }

    function formatClientKeyExpiry(value) {
      if (!value) return '永久有效';
      const time = Date.parse(value);
      if (!Number.isFinite(time)) return '永久有效';
      const text = new Date(time).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false });
      return `${text}${time <= Date.now() ? '（已到期）' : ''}`;
    }

    function toDatetimeLocalValue(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '';
      const offsetMs = date.getTimezoneOffset() * 60000;
      return new Date(date.getTime() - offsetMs).toISOString().slice(0, 16);
    }

    function datetimeLocalToIso(id) {
      const value = document.getElementById(id)?.value || '';
      if (!value) return '';
      const date = new Date(value);
      return Number.isNaN(date.getTime()) ? '' : date.toISOString();
    }

    function getClientKeyEntry(key) {
      return clientKeys.map(normalizeClientKey).find(item => item.key === key) || null;
    }

    function renderClientKeyChannelPicker(id, selected = []) {
      const selectedSet = new Set(selected || []);
      const channelRows = Object.entries(channels).map(([ckey, ch]) => `
    <label>
      <input type="checkbox" value="${escapeHtml(ckey)}" ${selectedSet.has(ckey) ? 'checked' : ''}>
      ${escapeHtml(ch.name || ckey)}
      <span class="count">${escapeHtml(ckey)} · ${(ch.models || []).length}</span>
    </label>
  `).join('');
      return `
    <label>可用渠道</label>
    <div class="model-picker" id="${escapeHtml(id)}">
      ${channelRows || '<div class="empty" style="padding:12px">还没有渠道</div>'}
    </div>
    <div class="hint">不勾选任何渠道 = 全部渠道可用。</div>`;
    }

    function getCheckedChannelKeys(id) {
      return [...document.querySelectorAll(`#${CSS.escape(id)} input:checked`)].map(input => input.value);
    }

    function renderClientKeyModelPicker(id, selected = []) {
      const selectedSet = new Set(selected || []);
      const modelRows = Object.entries(channels).flatMap(([ckey, ch]) =>
        (ch.models || []).map(model => `
    <label>
      <input type="checkbox" value="${escapeHtml(model)}" ${selectedSet.has(model) ? 'checked' : ''}>
      ${escapeHtml(model)} <span class="count">${escapeHtml(ch.name || ckey)}</span>
    </label>`)
      ).join('');
      return `
    <label>可用模型</label>
    <div class="model-picker" id="${escapeHtml(id)}">
      ${modelRows || '<div class="empty" style="padding:12px">还没有模型</div>'}
    </div>
    <div class="hint">不勾选任何模型 = 已选渠道中的全部模型可用。</div>`;
    }

    function getCheckedModels(id) {
      return [...document.querySelectorAll(`#${CSS.escape(id)} input:checked`)].map(input => input.value);
    }

    function showManualClientKeyModal() {
      showClientKeyEditor({ key: '', name: '', allowed_channels: [], quota_limit: 0, quota_used: 0, expires_at: '', enabled: true }, true);
    }

    function editClientKey(key) {
      const item = getClientKeyEntry(key);
      if (!item) { toast('调用 Key 不存在', false); return; }
      showClientKeyEditor(item, false);
    }

    function showClientKeyEditor(item, isNew) {
      document.getElementById('modalContent').innerHTML = `
    <h3>${isNew ? '添加调用 Key' : '编辑调用 Key'}</h3>
    <label>名称</label>
    <input id="clientKeyName" value="${escapeHtml(item.name || '')}" placeholder="例如 SillyTavern / 朋友A">
    <label>Key</label>
    <input id="clientKeyValue" value="${escapeHtml(item.key || '')}" ${isNew ? '' : 'readonly'} placeholder="留空可自动生成">
    <label class="checkbox-label">
      <input id="clientKeyEnabled" type="checkbox" ${item.enabled === false ? '' : 'checked'}>
      启用
    </label>
    <label>总额度</label>
    <input id="clientKeyEditQuotaLimit" type="number" min="0" step="1" value="${Number(item.quota_limit || 0)}">
    <div class="hint">0 = 不限额度。所有模型每次请求扣 1。</div>
    <label>已用额度</label>
    <input id="clientKeyEditQuotaUsed" type="number" min="0" step="1" value="${Number(item.quota_used || 0)}">
    <div class="hint">要重置额度就把这里改成 0 后保存。</div>
    <label>截止时间</label>
    <input id="clientKeyEditExpiresAt" type="datetime-local" value="${escapeHtml(toDatetimeLocalValue(item.expires_at || ''))}">
    <div class="hint">留空 = 永久有效。可以自由选择任意截止时间。</div>
    ${renderClientKeyChannelPicker('editClientKeyChannels', item.allowed_channels || [])}
    ${renderClientKeyModelPicker('editClientKeyModels', item.allowed_models || [])}
    <div class="actions">
      <button class="btn btn-outline" onclick="showClientKeysModal()">返回</button>
      <button class="btn btn-primary" onclick="saveClientKey(${isNew ? 'true' : 'false'})">保存</button>
    </div>`;
    }

    async function saveClientKey(isNew) {
      let key = document.getElementById('clientKeyValue').value.trim();
      const name = document.getElementById('clientKeyName').value.trim();
      if (!key) key = `key-${cryptoRandomString()}`;
      try {
        const res = await api('/api/config/client-keys/save', {
          method: 'POST',
          body: JSON.stringify({
            key,
            name,
            enabled: Boolean(document.getElementById('clientKeyEnabled')?.checked),
            quota_limit: Number(document.getElementById('clientKeyEditQuotaLimit')?.value || 0),
            quota_used: Number(document.getElementById('clientKeyEditQuotaUsed')?.value || 0),
            expires_at: datetimeLocalToIso('clientKeyEditExpiresAt'),
            allowed_channels: getCheckedChannelKeys('editClientKeyChannels'),
            allowed_models: getCheckedModels('editClientKeyModels'),
          })
        });
        clientKeys = res.api_keys || [];
        toast(isNew ? '调用 Key 已添加' : '调用 Key 已保存');
        showClientKeysModal();
        renderHeaderStats();
      } catch (e) {
        toast('保存失败: ' + e.message, false);
      }
    }

    function cryptoRandomString() {
      const bytes = new Uint8Array(18);
      crypto.getRandomValues(bytes);
      return btoa(String.fromCharCode(...bytes)).replace(/[+/=]/g, '').slice(0, 24);
    }

    async function generateClientKeys() {
      const count = document.getElementById('clientKeyCount').value;
      const prefix = document.getElementById('clientKeyPrefix').value;
      const quotaLimit = Number(document.getElementById('clientKeyQuotaLimit')?.value || 0);
      const expiresAt = datetimeLocalToIso('clientKeyExpiresAt');
      try {
        const res = await api('/api/config/client-keys/generate', {
          method: 'POST',
          body: JSON.stringify({ count, prefix, quota_limit: quotaLimit, expires_at: expiresAt, allowed_channels: getCheckedChannelKeys('newClientKeyChannels'), allowed_models: getCheckedModels('newClientKeyModels') })
        });
        clientKeys = res.api_keys || [];
        toast(`已生成 ${res.keys?.length || 0} 个调用 Key`);
        showClientKeysModal();
        renderHeaderStats();
      } catch (e) {
        toast('生成失败: ' + e.message, false);
      }
    }

    async function deleteClientKey(key) {
      if (!confirm('确定删除这个调用 Key？')) return;
      try {
        const res = await api('/api/config/client-keys/delete', {
          method: 'POST',
          body: JSON.stringify({ key })
        });
        clientKeys = res.api_keys || [];
        toast('调用 Key 已删除');
        showClientKeysModal();
        renderHeaderStats();
      } catch (e) {
        toast('删除失败: ' + e.message, false);
      }
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString('zh-CN');
    }

    function parseKeyList(value = '') {
      const seen = new Set();
      return String(value || '')
        .split(/\n|,/)
        .map(item => item.trim())
        .filter(Boolean)
        .filter(item => {
          if (seen.has(item)) return false;
          seen.add(item);
          return true;
        });
    }

    function getChannelKeys(ch = {}) {
      return parseKeyList([ch.key, ...(Array.isArray(ch.keys) ? ch.keys : [])].filter(Boolean).join('\n'));
    }

    function getDisabledKeys(ch = {}) {
      return Array.isArray(ch.disabled_keys) ? ch.disabled_keys : [];
    }

    function getChannelKeyCount(ch = {}) {
      const total = getChannelKeys(ch).length || 0;
      const disabled = getDisabledKeys(ch).length;
      if (disabled > 0) return `${total - disabled}/${total} keys`;
      return `${total} keys`;
    }

    function maskKey(key = '') {
      if (!key) return '';
      if (key.length <= 8) return key[0] + '***' + key.slice(-1);
      return key.slice(0, 4) + '...' + key.slice(-3);
    }

    function addUsage(target, name, item = {}) {
      if (!name) return;
      if (!target[name]) target[name] = { count: 0, tokens: 0, cacheHitCount: 0, cacheReadInputTokens: 0, cacheCreationInputTokens: 0 };
      target[name].count += item.count || 0;
      target[name].tokens += item.tokens || 0;
      target[name].cacheHitCount += getCacheHitCount(item);
      target[name].cacheReadInputTokens += getCacheReadInputTokens(item);
      target[name].cacheCreationInputTokens += getCacheCreationInputTokens(item);
    }

    function getCacheHitCount(item = {}) {
      return Number(item.cacheHitCount) || 0;
    }

    function getCacheReadInputTokens(item = {}) {
      return Number(item.cacheReadInputTokens) || 0;
    }

    function getCacheCreationInputTokens(item = {}) {
      return Number(item.cacheCreationInputTokens) || 0;
    }

    function summarizeCache(usage = {}) {
      return Object.values(usage).reduce((sum, item) => ({
        cacheHitCount: sum.cacheHitCount + getCacheHitCount(item),
        cacheReadInputTokens: sum.cacheReadInputTokens + getCacheReadInputTokens(item),
        cacheCreationInputTokens: sum.cacheCreationInputTokens + getCacheCreationInputTokens(item),
      }), { cacheHitCount: 0, cacheReadInputTokens: 0, cacheCreationInputTokens: 0 });
    }

    function makeEmptyLogSummary() {
      return {
        requests: 0,
        tokens: 0,
        failures: 0,
        cacheHitCount: 0,
        cacheReadInputTokens: 0,
        cacheCreationInputTokens: 0,
        models: {}
      };
    }

    function makeEmptyRecentDelta() {
      return {
        lastHour: makeEmptyLogSummary(),
        last24h: makeEmptyLogSummary(),
        today: makeEmptyLogSummary(),
        yesterday: makeEmptyLogSummary(),
        latestTime: ''
      };
    }

    function makeEmptyStatsView(label = '全部时间') {
      return {
        label,
        totalRequests: 0,
        totalTokens: 0,
        cacheHitCount: 0,
        cacheReadInputTokens: 0,
        cacheCreationInputTokens: 0,
        modelUsage: {},
        channelUsage: {},
        ipUsage: {},
        recentLogs: [],
        timeSeries: [],
        recentDelta: makeEmptyRecentDelta()
      };
    }

    function shiftDateKey(daysAgo) {
      const date = new Date();
      date.setUTCDate(date.getUTCDate() - daysAgo);
      return date.toISOString().slice(0, 10);
    }

    function getDateKeysBetween(start, end) {
      if (!start || !end || start > end) return [];
      const keys = [];
      const cursor = new Date(`${start}T00:00:00Z`);
      const last = new Date(`${end}T00:00:00Z`);
      while (cursor <= last) {
        keys.push(cursor.toISOString().slice(0, 10));
        cursor.setUTCDate(cursor.getUTCDate() + 1);
      }
      return keys;
    }

    function getStatsDateRange() {
      const mode = document.getElementById('statsRange')?.value || 'all';
      const today = shiftDateKey(0);
      if (mode === 'today') return { mode, label: '今天', keys: [today] };
      if (mode === '7d') return { mode, label: '最近 7 天', keys: getDateKeysBetween(shiftDateKey(6), today) };
      if (mode === '30d') return { mode, label: '最近 30 天', keys: getDateKeysBetween(shiftDateKey(29), today) };
      if (mode === 'custom') {
        const start = document.getElementById('statsStart')?.value || today;
        const end = document.getElementById('statsEnd')?.value || today;
        return { mode, label: `${start} 到 ${end}`, keys: getDateKeysBetween(start, end) };
      }
      return { mode: 'all', label: '全部时间', keys: null };
    }

    function getDayStats(key) {
      const day = gatewayStats?.dailyStats?.[key] || {};
      const cache = summarizeCache(day.models || {});
      return {
        key,
        label: key.slice(5),
        requests: Number(day.requests) || 0,
        tokens: Number(day.tokens) || 0,
        ...cache
      };
    }

    function getHourStats(hourKey) {
